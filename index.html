<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Planner (Admin - Raw & KPI แยกส่วน)</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin-style.css">
</head>
<body class="flex h-screen relative bg-slate-50">

    <div id="loader" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[10000] flex flex-col items-center justify-center hidden">
        <div class="w-16 h-16 border-4 border-sky-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p id="loader-text" class="text-white font-bold">กำลังประมวลผล...</p>
        <p id="loader-subtext" class="text-sky-300 text-xs mt-2 italic"></p>
    </div>

    <aside class="w-72 bg-slate-900 text-slate-300 flex flex-col shadow-2xl z-40">
        <div class="p-6 border-b border-slate-800">
            <h1 class="text-xl font-black text-white tracking-tight flex items-center gap-2">🚚 Route Admin</h1>
        </div>
        
        <nav class="flex-1 mt-4">
            <button id="nav-planning" onclick="Nav.go('planning')" class="sidebar-menu active w-full flex items-center gap-3 px-6 py-4 hover:bg-slate-800 transition">📍 วางแผนคิวงาน</button>
            
            <button id="nav-all-routes" onclick="Nav.goAllRoutes()" class="sidebar-menu w-full flex items-center gap-3 px-6 py-4 hover:bg-slate-800 transition text-sky-400 font-bold">🗺️ แผนที่รวมทุกสาย (Vans)</button>
            
            <button id="nav-data" onclick="Nav.go('data')" class="sidebar-menu w-full flex items-center gap-3 px-6 py-4 hover:bg-slate-800 transition">📂 ข้อมูลการขาย</button>
            <button id="nav-kpi" onclick="Nav.go('kpi')" class="sidebar-menu w-full flex items-center gap-3 px-6 py-4 hover:bg-slate-800 transition">📊 สรุปผล KPI</button>
        </nav>

        <div class="p-4 bg-slate-950 border-t border-slate-800">
            <div class="flex justify-between text-[10px] mb-2 font-bold text-slate-500 uppercase">Status: <span id="overall-status" class="text-emerald-500">Online</span></div>
            <button onclick="UI.showSummaryModal()" class="w-full py-2 bg-slate-800 hover:bg-slate-700 rounded-lg text-[11px] font-bold transition">📊 ดูสรุปยอดรวมทั้งหมด</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative overflow-hidden">
        
        <div id="page-planning" class="flex-1 relative flex overflow-hidden">
            <div id="map"></div>

            <div id="all-routes-legend" class="hidden absolute bottom-6 left-6 z-[1000] bg-white/95 backdrop-blur-md p-5 rounded-2xl shadow-2xl border border-gray-200 max-h-[40vh] overflow-y-auto min-w-[200px]">
                <h3 class="text-[10px] font-black mb-3 uppercase text-gray-500 tracking-widest border-b pb-2">สีประจำสายวิ่ง (Vans)</h3>
                <div id="legend-content" class="space-y-3"></div>
            </div>

            <div id="lassoPanel" class="hidden absolute top-6 left-1/2 -translate-x-1/2 z-[1000] flex gap-2">
                <button onclick="Lasso.finish()" class="bg-indigo-600 text-white px-6 py-2 rounded-full font-bold shadow-lg">✅ ยืนยันเลือก</button>
                <button onclick="Lasso.cancel()" class="bg-white text-gray-700 px-6 py-2 rounded-full font-bold shadow-lg border">ยกเลิก</button>
            </div>
            
            <div id="mapTools" class="absolute top-6 right-6 z-[500] flex flex-col gap-2">
                <button onclick="Lasso.start()" class="bg-white/90 p-3 rounded-xl shadow-xl hover:bg-white border border-slate-200">🎯 Lasso</button>
            </div>
        </div>

        <div id="page-data" class="hidden flex-1 p-8 bg-slate-50 overflow-y-auto">
            <div class="max-w-4xl mx-auto bg-white p-8 rounded-3xl shadow-xl border border-slate-200">
                <h2 class="text-2xl font-black text-slate-800 mb-6 flex items-center gap-3">📂 จัดการฐานข้อมูล</h2>
                <div class="grid grid-cols-2 gap-6">
                    <div class="p-6 bg-slate-50 rounded-2xl border-2 border-dashed border-slate-200 text-center">
                        <p class="text-sm font-bold text-slate-600 mb-4">อัปโหลดไฟล์ Master (Excel)</p>
                        <input type="file" id="rawUpload" class="hidden" accept=".xlsx, .xls">
                        <button onclick="document.getElementById('rawUpload').click()" class="w-full py-4 bg-indigo-600 text-white rounded-xl font-bold">📤 เลือกไฟล์</button>
                        <p class="text-[10px] mt-2 font-bold uppercase">พบข้อมูล: <span id="raw-total-rows">0</span> แถว</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="page-kpi" class="hidden flex-1 bg-slate-100">
            <iframe src="kpi-dashboard.html" class="w-full h-full border-none"></iframe>
        </div>
    </main>

    <section id="right-panel" class="w-[380px] bg-white border-l border-slate-200 flex flex-col shadow-inner relative z-30 transition-all">
        <div class="flex border-b bg-gray-50">
            <button onclick="UI.switchTab('tab1')" class="tab-btn flex-1 py-4 active">📁 นำเข้า</button>
            <button onclick="UI.switchTab('tab2')" class="tab-btn flex-1 py-4">⚡ จัดสาย</button>
            <button onclick="UI.switchTab('tab3')" class="tab-btn flex-1 py-4">🤖 AI</button>
        </div>

        <div class="flex-1 overflow-y-auto">
            <div id="tab1-content" class="p-5 space-y-4">
                <select id="routeSelect" class="w-full p-3 bg-slate-100 rounded-xl font-bold outline-none ring-2 ring-indigo-500/20"></select>
                
                <button onclick="StoreMgr.clearAllAssignments()" class="w-full py-2.5 bg-red-50 text-red-600 text-[11px] font-bold rounded-xl border border-red-200 hover:bg-red-100 transition shadow-sm">
                    🗑️ ล้างการจัดสายทั้งหมด (รีเซ็ตหมุด)
                </button>
            </div>

            <div id="tab3-content" class="hidden p-5">
                <div class="bg-slate-900 p-6 rounded-3xl text-white space-y-4">
                    <div class="flex justify-between items-center">
                        <label class="text-xs font-bold">วันทั้งหมด:</label>
                        <input type="number" id="ai-days" value="24" class="w-16 p-1 bg-white/10 rounded text-center font-black text-emerald-400">
                    </div>
                    
                    <div class="flex items-center gap-2">
                        <input type="checkbox" id="ai-lock" checked> 
                        <label for="ai-lock" class="text-[11px] font-bold text-slate-400">ล็อคร้านที่จัดแล้ว</label>
                    </div>
                    
                    <div class="flex items-center gap-2">
                        <input type="checkbox" id="ai-outlier" checked> 
                        <label class="text-[11px] font-bold text-slate-400">ตัดร้านโดด (กม.):</label>
                        <input type="number" id="ai-dist" value="10" class="w-12 bg-white/10 rounded text-center text-xs text-emerald-400">
                    </div>

                    <button onclick="AI.run()" class="w-full py-4 bg-emerald-500 text-slate-900 rounded-2xl font-black shadow-xl">🚀 รัน AI แบ่งวันวิ่ง</button>
                </div>
            </div>
        </div>
    </section>

    <script src="app-config.js"></script>
    <script src="admin-data.js"></script>
    <script src="admin-ui.js"></script>
    <script src="admin-map.js"></script>
    <script src="admin-ai.js"></script>
</body>
</html>
