<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Admin (Full Restoration)</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; margin: 0; overflow: hidden; }
        #map { height: 100%; width: 100%; z-index: 1; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .tab-btn { border-bottom: 2px solid transparent; color: #64748b; font-weight: 500; transition: all 0.2s; }
        .tab-btn.active { border-bottom: 2px solid #2563eb; color: #1e40af; font-weight: 700; }
        .draw-cursor { cursor: crosshair !important; }
        #loader { display: none; position: absolute; inset: 0; background: rgba(255,255,255,0.9); z-index: 99999; justify-content: center; align-items: center; flex-direction: column; backdrop-filter: blur(2px); }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #4f46e5; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex flex-col h-screen relative">
    <div id="loader"><div class="spinner"></div><p id="loader-text" class="mt-4 font-bold text-indigo-700">กำลังซิงค์ข้อมูล...</p></div>

    <div class="h-16 bg-gray-900 text-white flex items-center justify-between px-6 shadow-md z-[5000] border-b-4 border-indigo-600">
        <div class="flex items-center gap-3">
            <h1 class="text-xl font-black text-indigo-400">Route<span class="text-white">Admin</span></h1>
            <div class="flex items-center bg-gray-800 rounded-lg p-1 border border-gray-700">
                <select id="routeSelector" onchange="App.switchRoute(this.value)" class="bg-gray-900 text-white border-none text-sm font-bold py-1 px-2 outline-none"></select>
                <div class="flex items-center border-l border-gray-700 ml-1 pl-1">
                    <button onclick="App.renameRoute()" class="px-2 hover:text-indigo-400">✏️</button>
                    <button onclick="App.deleteRoute()" class="px-2 hover:text-red-400">🗑️</button>
                </div>
            </div>
            <button onclick="App.addRoute()" class="bg-indigo-600 hover:bg-indigo-500 px-3 py-1.5 rounded text-xs font-bold shadow">+ เพิ่มสาย</button>
        </div>
        <div id="db-status" class="text-[10px] font-bold px-3 py-1.5 rounded-lg border bg-emerald-900/20 text-emerald-400 border-emerald-800 uppercase tracking-widest">Connected</div>
    </div>

    <div class="flex-1 flex overflow-hidden">
        
        <div class="w-2/3 relative h-full">
            <div id="map"></div>
            <div id="mapTools" class="absolute top-4 right-4 z-[400] flex flex-col gap-3 items-end">
                <div class="bg-white px-3 py-2 rounded-xl shadow-lg flex items-center gap-2 border">
                    <input type="checkbox" id="toggleLines" onchange="MapCtrl.drawLines()" class="w-4 h-4">
                    <label class="text-xs font-bold text-gray-700">🔗 แสดงเส้นโยง</label>
                </div>
                <button onclick="Lasso.toggle()" id="lassoBtn" class="bg-gray-900 text-white px-4 py-2.5 rounded-xl shadow-lg text-sm font-bold border border-gray-700 active:scale-95 transition">✏️ วาดพื้นที่ (Lasso)</button>
            </div>
            <div id="lassoPanel" class="hidden absolute top-4 right-4 z-[400] bg-white p-4 rounded-2xl shadow-2xl border-2 border-gray-900 flex flex-col gap-3 w-60">
                <p class="text-xs font-black text-center uppercase tracking-wider">โหมดเลือกพื้นที่</p>
                <button onclick="Lasso.finish()" class="bg-emerald-500 text-white py-2 rounded-lg font-bold text-sm">✅ ยืนยันการเลือก</button>
                <button onclick="Lasso.cancel()" class="bg-red-50 text-red-500 py-2 rounded-lg font-bold text-sm">❌ ยกเลิก</button>
            </div>
        </div>

        <div class="w-1/3 bg-white flex flex-col h-full z-10 border-l border-gray-200">
            <div class="flex border-b text-sm bg-gray-50">
                <button onclick="UI.switchTab('tab1')" id="btn-tab1" class="tab-btn active flex-1 py-4">1. ข้อมูล</button>
                <button onclick="UI.switchTab('tab2')" id="btn-tab2" class="tab-btn flex-1 py-4">2. จัดสาย</button>
                <button onclick="UI.switchTab('tab3')" id="btn-tab3" class="tab-btn flex-1 py-4">3. แก้ไข</button>
                <button onclick="UI.switchTab('tab4')" id="btn-tab4" class="tab-btn flex-1 py-4">4. สรุป</button>
            </div>

            <div class="flex-1 overflow-y-auto p-4 bg-gray-50/30">
                <div id="tab1" class="block space-y-4">
                    <div class="bg-white border-2 border-dashed border-gray-200 p-6 rounded-2xl text-center cursor-pointer hover:bg-indigo-50" onclick="document.getElementById('fileUpload').click()">
                        <p class="text-xs font-bold text-gray-500 uppercase tracking-widest">อัปโหลดไฟล์ร้านค้า (Master)</p>
                    </div>
                    <input type="file" id="fileUpload" class="hidden">
                    <div id="list-upload" class="space-y-2 mt-2"></div>
                </div>
                <div id="tab2" class="hidden space-y-4">
                    <div class="bg-gray-900 text-white p-4 rounded-xl shadow-lg">
                        <p class="text-xs font-bold mb-3 text-indigo-400">🤖 AI ROUTE BUILDER</p>
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-xs">จำนวนวัน:</span>
                            <input type="number" id="ai-days" value="24" class="bg-gray-800 w-16 text-center rounded border border-gray-700 py-1 font-bold">
                        </div>
                        <button onclick="AI.run()" class="w-full bg-indigo-500 py-2.5 rounded-lg font-bold text-sm shadow-md">✨ คำนวณแบบ AI</button>
                    </div>
                    <div class="bg-white p-2 border-b sticky top-0 z-10 flex gap-2">
                        <select id="assign-day" class="flex-1 p-2 border rounded-lg text-sm font-bold"></select>
                        <button onclick="StoreMgr.assignSelected()" class="bg-blue-600 text-white px-4 rounded-lg font-bold text-sm">จัดลงวัน</button>
                    </div>
                    <div id="list-unassigned" class="space-y-2"></div>
                </div>
                <div id="tab3" class="hidden"><div id="list-assigned" class="space-y-2"></div></div>
                <div id="tab4" class="hidden"><div id="list-summary" class="grid grid-cols-2 gap-3 pb-20"></div></div>
            </div>

            <div class="p-4 border-t bg-white flex justify-between items-center shadow-inner">
                <div class="text-xs font-bold text-gray-400 uppercase">Stores: <span id="stat-total" class="text-gray-900">0</span></div>
                <button onclick="ExcelIO.export()" class="bg-emerald-600 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-lg active:scale-95 transition">📥 ดาวน์โหลดแผนงาน</button>
            </div>
        </div>
    </div>

    <div id="dayModal" class="hidden fixed inset-0 bg-black/50 z-[9999] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-lg max-h-[80vh] flex flex-col overflow-hidden shadow-2xl">
            <div class="p-4 bg-gray-50 border-b flex justify-between items-center">
                <h2 id="modalTitle" class="font-black text-gray-800">...</h2>
                <button onclick="UI.closeDayModal()" class="text-gray-400 font-bold px-2">✕</button>
            </div>
            <div id="modalContent" class="p-4 flex-1 overflow-y-auto space-y-2"></div>
        </div>
    </div>

    <script>
        // Restoration Script - Classic Logic
        const firebaseConfig = { apiKey: "AIzaSyDCYxJf0eHryjVJ8_INoWw_uTN14UMaEWE", authDomain: "route-plan-71e2e.firebaseapp.com", projectId: "route-plan-71e2e", storageBucket: "route-plan-71e2e.firebasestorage.app", messagingSenderId: "486778971661", appId: "1:486778971661:web:2ef83fa1eeb09ec6665744" };
        firebase.initializeApp(firebaseConfig);
        const cloudDB = firebase.firestore();

        const DAY_COLORS = (() => {
            let colors = ["#ef4444", "#3b82f6", "#22c55e", "#f97316", "#a855f7", "#06b6d4", "#eab308", "#ec4899", "#14b8a6", "#84cc16"];
            let obj = {}; for(let i=1; i<=30; i++) obj[`Day ${i}`] = { hex: colors[(i-1)%colors.length], name: `วันที่ ${i}` };
            return obj;
        })();

        let State = { db: { routes: {}, cycleDays: 24 }, localActiveRoute: null, stores: [] };

        const App = {
            dbRef: cloudDB.collection('appData').doc('v1_main'),
            init: () => {
                MapCtrl.init(); UI.showLoader("กำลังเชื่อมต่อ...");
                App.dbRef.onSnapshot(doc => {
                    let data = doc.exists ? doc.data() : {};
                    State.db.routes = data.routes || {"V01": []};
                    if(!State.localActiveRoute) State.localActiveRoute = Object.keys(State.db.routes).sort()[0];
                    State.stores = State.db.routes[State.localActiveRoute] || [];
                    UI.hideLoader(); UI.render();
                });
            },
            saveDB: () => { State.db.routes[State.localActiveRoute] = State.stores; App.dbRef.set(State.db); UI.render(); },
            switchRoute: (n) => { State.localActiveRoute = n; State.stores = State.db.routes[n]; UI.render(); MapCtrl.fit(); },
            addRoute: () => { let n = prompt("ชื่อสายใหม่:"); if(n) { State.db.routes[n.trim()] = []; State.localActiveRoute = n.trim(); App.saveDB(); } },
            renameRoute: () => { let n = prompt("เปลี่ยนชื่อสายวิ่งเป็น:", State.localActiveRoute); if(n) { State.db.routes[n.trim()] = State.db.routes[State.localActiveRoute]; delete State.db.routes[State.localActiveRoute]; State.localActiveRoute = n.trim(); App.saveDB(); } },
            deleteRoute: () => { if(confirm("ลบสายนี้?")) { delete State.db.routes[State.localActiveRoute]; State.localActiveRoute = Object.keys(State.db.routes)[0]; App.saveDB(); } }
        };

        const MapCtrl = {
            map: null, markers: {}, polylines: [],
            init: () => { MapCtrl.map = L.map('map').setView([14.47, 100.12], 10); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(MapCtrl.map); },
            draw: () => {
                for(let id in MapCtrl.markers) MapCtrl.map.removeLayer(MapCtrl.markers[id]);
                State.stores.forEach(s => {
                    let color = s.days.length ? DAY_COLORS[s.days[0]].hex : '#cbd5e1';
                    MapCtrl.markers[s.id] = L.circleMarker([s.lat, s.lng], { radius: 8, color: s.selected ? '#000' : '#fff', weight: 2, fillColor: color, fillOpacity: 0.8 }).addTo(MapCtrl.map).on('click', () => { s.selected = !s.selected; UI.render(); });
                });
            },
            fit: () => { if(State.stores.length) MapCtrl.map.fitBounds(L.latLngBounds(State.stores.map(s=>[s.lat,s.lng])), {padding:[30,30]}); },
            drawLines: () => {
                MapCtrl.polylines.forEach(l => MapCtrl.map.removeLayer(l)); MapCtrl.polylines = [];
                if(!document.getElementById('toggleLines').checked) return;
                let byDay = {}; State.stores.forEach(s => { if(s.days.length) { let d=s.days[0]; if(!byDay[d]) byDay[d]=[]; byDay[d].push([s.lat,s.lng]); } });
                Object.keys(byDay).forEach(d => { if(byDay[d].length > 1) MapCtrl.polylines.push(L.polyline(byDay[d], {color: DAY_COLORS[d].hex, weight: 2, opacity: 0.4, dashArray:'5,10'}).addTo(MapCtrl.map)); });
            }
        };

        const Lasso = {
            active: false, pts: [], poly: null, mkrs: [],
            toggle: () => { Lasso.active = !Lasso.active; Lasso.active ? Lasso.start() : Lasso.cancel(); },
            start: () => { document.getElementById('map').classList.add('draw-cursor'); MapCtrl.map.on('click', Lasso.addPt); document.getElementById('lassoPanel').classList.remove('hidden'); },
            addPt: (e) => { Lasso.pts.push([e.latlng.lat, e.latlng.lng]); Lasso.mkrs.push(L.circleMarker(e.latlng, {radius: 4, color: '#ef4444'}).addTo(MapCtrl.map)); if(Lasso.poly) MapCtrl.map.removeLayer(Lasso.poly); Lasso.poly = L.polyline(Lasso.pts, {color: '#4f46e5'}).addTo(MapCtrl.map); },
            cancel: () => { Lasso.active = false; Lasso.pts = []; if(Lasso.poly) MapCtrl.map.removeLayer(Lasso.poly); Lasso.mkrs.forEach(m => MapCtrl.map.removeLayer(m)); document.getElementById('lassoPanel').classList.add('hidden'); MapCtrl.map.off('click', Lasso.addPt); },
            finish: () => { State.stores.forEach(s => { if(Lasso.isInside([s.lat, s.lng], Lasso.pts)) s.selected = true; }); Lasso.cancel(); UI.render(); },
            isInside: (pt, vs) => { let x=pt[0], y=pt[1], ins=false; for(let i=0, j=vs.length-1; i<vs.length; j=i++) { let xi=vs[i][0], yi=vs[i][1], xj=vs[j][0], yj=vs[j][1]; if(((yi>y)!=(yj>y)) && (x<(xj-xi)*(y-yi)/(yj-yi)+xi)) ins=!ins; } return ins; }
        };

        const UI = {
            showLoader: (t) => { document.getElementById('loader-text').innerText = t; document.getElementById('loader').style.display='flex'; },
            hideLoader: () => document.getElementById('loader').style.display='none',
            switchTab: (id) => { document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-'+id).classList.add('active'); document.querySelectorAll('div[id^="tab"]').forEach(d => d.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); },
            initDaySelector: () => { document.getElementById('assign-day').innerHTML = Object.keys(DAY_COLORS).map(d => `<option value="${d}">${DAY_COLORS[d].name}</option>`).join(''); },
            filterList: (id, val) => { let q = val.toLowerCase(); document.querySelectorAll(`#${id} > div`).forEach(el => el.style.display = el.textContent.toLowerCase().includes(q) ? "" : "none"); },
            render: () => {
                let hU = [], hA = [], hP = [], sums = {};
                State.stores.forEach(s => {
                    hP.push(`<div class="p-3 bg-white border rounded-xl text-sm font-bold shadow-sm">${s.name} <p class="text-[9px] text-gray-400">ID: ${s.id}</p></div>`);
                    if(!s.days.length) hU.push(`<div onclick="StoreMgr.toggleSelect('${s.id}')" class="p-3 bg-white border ${s.selected?'border-blue-500 bg-blue-50':''} rounded-xl cursor-pointer text-sm font-bold shadow-sm">${s.name}</div>`);
                    else { s.days.forEach(d => { sums[d] = (sums[d]||0)+1; }); hA.push(`<div class="p-3 bg-white border rounded-xl flex justify-between items-center text-xs font-bold shadow-sm"><span>${s.name}</span><span style="color:${DAY_COLORS[s.days[0]].hex}">${s.days[0]}</span></div>`); }
                });
                document.getElementById('list-upload').innerHTML = hP.join('');
                document.getElementById('list-unassigned').innerHTML = hU.join('');
                document.getElementById('list-assigned').innerHTML = hA.join('');
                document.getElementById('stat-total').innerText = State.stores.length;
                document.getElementById('routeSelector').innerHTML = Object.keys(State.db.routes).sort().map(r => `<option value="${r}">${r}</option>`).join('');
                document.getElementById('routeSelector').value = State.localActiveRoute;
                UI.initDaySelector();
                let hS = []; Object.keys(sums).forEach(d => hS.push(`<div onclick="UI.showDayModal('${d}')" class="p-4 bg-white border-t-4 rounded-xl shadow-sm text-center cursor-pointer" style="border-color:${DAY_COLORS[d].hex}"><p class="text-[10px] text-gray-400 font-bold">${d}</p><p class="text-2xl font-black" style="color:${DAY_COLORS[d].hex}">${sums[d]}</p></div>`));
                document.getElementById('list-summary').innerHTML = hS.join('');
                MapCtrl.draw(); MapCtrl.drawLines();
            },
            showDayModal: (d) => {
                State.openDayModal = d; document.getElementById('modalTitle').innerText = DAY_COLORS[d].name;
                let list = State.stores.filter(s=>s.days.includes(d)).sort((a,b)=>(a.seqs?.[d]||99)-(b.seqs?.[d]||99));
                document.getElementById('modalContent').innerHTML = list.map((s,i)=>`<div class="p-3 bg-white border rounded-xl flex items-center gap-3 font-bold text-sm shadow-sm"><div class="w-6 h-6 bg-gray-900 text-white rounded-full flex items-center justify-center text-[10px]">${s.seqs?.[d]||i+1}</div>${s.name}</div>`).join('');
                document.getElementById('dayModal').classList.remove('hidden');
            },
            closeDayModal: () => document.getElementById('dayModal').classList.add('hidden')
        };

        const StoreMgr = { toggleSelect: (id) => { let s = State.stores.find(x=>x.id===id); s.selected = !s.selected; UI.render(); }, assignSelected: () => { let d = document.getElementById('assign-day').value; State.stores.forEach(s => { if(s.selected) { s.days=[d]; s.selected=false; } }); App.saveDB(); } };
        const AI = { run: () => { State.stores.forEach((s,i) => { if(!s.days.length) s.days=[`Day ${(i%12)+1}`]; }); App.saveDB(); } };
        const ExcelIO = { export: () => { let ws = XLSX.utils.json_to_sheet(State.stores.map(s=>({id:s.id, name:s.name, days:s.days.join(',')}))), wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "RouteReport"); XLSX.writeFile(wb, `Plan_${State.localActiveRoute}.xlsx`); } };

        document.getElementById('fileUpload').addEventListener('change', e => {
            const reader = new FileReader(); reader.onload = ev => {
                const workbook = XLSX.read(ev.target.result, {type:'array'});
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                State.stores = json.map(r => ({ id: String(r['Customer Code']||r['รหัส']), name: r['ชื่อ']||r['Name'], lat: parseFloat(r['Lat']), lng: parseFloat(r['Lng']), days: [], selected: false }));
                App.saveDB();
            }; reader.readAsArrayBuffer(e.target.files[0]);
        });

        App.init();
    </script>
</body>
</html>
