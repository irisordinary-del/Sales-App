<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Admin V78 (Deep Analytics)</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; overflow: hidden; }
        #map { height: 100%; width: 100%; z-index: 1; }
        .tab-btn { border-bottom: 2px solid transparent; color: #64748b; font-weight: 500; transition: all 0.2s; font-size: 13px; }
        .tab-btn.active { border-bottom: 2px solid #2563eb; color: #1e40af; font-weight: 700; }
        #loader { display: none; position: absolute; inset: 0; background: rgba(255,255,255,0.9); z-index: 99999; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #4f46e5; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex flex-col h-screen relative">
    <div id="loader"><div class="spinner"></div><p id="loader-text" class="mt-4 font-bold text-indigo-700">กำลังคำนวณบิลและ SKU...</p></div>

    <div class="h-16 bg-gray-900 text-white flex items-center justify-between px-6 shadow-md z-[5000] border-b-4 border-indigo-600">
        <div class="flex items-center gap-3">
            <h1 class="text-xl font-black text-indigo-400">Route<span class="text-white">Admin</span><span class="text-xs ml-1">V78</span></h1>
            <div class="flex items-center bg-gray-800 rounded-lg p-1 border border-gray-700">
                <select id="routeSelector" onchange="App.switchRoute(this.value)" class="bg-gray-900 text-white border-none text-sm font-bold py-1 px-2 outline-none"></select>
                <button onclick="App.renameRoute()" class="px-2">✏️</button>
            </div>
            <button onclick="App.addRoute()" class="bg-indigo-600 px-3 py-1.5 rounded text-xs font-bold shadow">+ เพิ่มสาย</button>
        </div>
        <div id="db-save-status" class="text-xs px-3 py-1.5 rounded-lg border"></div>
    </div>

    <div class="flex-1 flex overflow-hidden">
        <div class="w-2/3 relative h-full"><div id="map"></div></div>
        <div class="w-1/3 bg-white flex flex-col h-full z-10 border-l border-gray-200">
            <div class="flex border-b text-sm bg-gray-50">
                <button onclick="UI.switchTab('tab1')" id="btn-tab1" class="tab-btn active flex-1 py-3">1. ข้อมูล</button>
                <button onclick="UI.switchTab('tab2')" id="btn-tab2" class="tab-btn flex-1 py-3">2. จัดสาย</button>
                <button onclick="UI.switchTab('tab3')" id="btn-tab3" class="tab-btn flex-1 py-3">3. สรุป</button>
            </div>
            <div class="flex-1 overflow-y-auto p-4">
                <div id="tab1" class="block space-y-4">
                    <div class="border-2 border-dashed border-indigo-200 p-4 rounded-xl text-center cursor-pointer bg-indigo-50" onclick="document.getElementById('fileUpload').click()">📍 อัปโหลดพิกัด</div>
                    <input type="file" id="fileUpload" class="hidden">
                    
                    <div class="border-2 border-dashed border-emerald-200 p-4 rounded-xl text-center cursor-pointer bg-emerald-50" onclick="document.getElementById('salesUpload').click()">📊 อัปโหลดไฟล์ Sellout (รายเดือน)</div>
                    <input type="file" id="salesUpload" class="hidden">
                    
                    <div id="list-upload" class="space-y-2 mt-2"></div>
                </div>
                <div id="tab2" class="hidden">
                    <div class="bg-indigo-50 p-4 rounded-xl mb-4 text-xs font-bold text-indigo-800">เลือกวันและเลือกร้านค้าเพื่อจัดสายวิ่ง</div>
                    <select id="assign-day" class="w-full p-2 border rounded-xl mb-2"></select>
                    <button onclick="StoreMgr.assignSelected()" class="w-full bg-indigo-600 text-white py-2 rounded-xl font-bold">จัดร้านที่เลือก</button>
                    <div id="list-unassigned" class="mt-4 space-y-2"></div>
                </div>
                <div id="tab3" class="hidden"><div id="list-summary" class="grid grid-cols-2 gap-2"></div></div>
            </div>
            <div class="p-4 bg-white border-t flex justify-between">
                <div class="text-xs">ร้านทั้งหมด: <span id="stat-total" class="font-bold">0</span></div>
                <button onclick="ExcelIO.export()" class="bg-emerald-600 text-white px-4 py-2 rounded-lg text-xs font-bold shadow">📥 โหลดแผนออก</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDCYxJf0eHryjVJ8_INoWw_uTN14UMaEWE", authDomain: "route-plan-71e2e.firebaseapp.com", projectId: "route-plan-71e2e", storageBucket: "route-plan-71e2e.firebasestorage.app", messagingSenderId: "486778971661", appId: "1:486778971661:web:2ef83fa1eeb09ec6665744" };
        firebase.initializeApp(firebaseConfig);
        const cloudDB = firebase.firestore();

        const Config = { hexColors: ["#ef4444", "#3b82f6", "#22c55e", "#f97316", "#a855f7", "#06b6d4", "#eab308", "#ec4899", "#14b8a6", "#84cc16"], getDays: () => { let obj={}; for(let i=1; i<=30; i++) obj[`Day ${i}`] = { hex: Config.hexColors[(i-1)%Config.hexColors.length], name: `วันที่ ${i}` }; return obj; } };
        const DAY_COLORS = Config.getDays();

        const State = { db: { routes: {}, cycleDays: 24 }, sales: {}, localActiveRoute: null, stores: [] };

        const App = {
            dbRef: cloudDB.collection('appData').doc('v1_main'),
            salesRef: cloudDB.collection('appData').doc('v1_sales'),

            init: () => {
                MapCtrl.init();
                App.dbRef.onSnapshot((doc) => {
                    let data = doc.exists ? doc.data() : {};
                    State.db.routes = data.routes || {"V01": []};
                    if (!State.localActiveRoute) State.localActiveRoute = Object.keys(State.db.routes).sort()[0];
                    State.stores = State.db.routes[State.localActiveRoute] || [];
                    App.fetchSalesData();
                });
            },
            fetchSalesData: () => { App.salesRef.get().then(doc => { State.sales = doc.exists ? doc.data() : {}; App.sync(); }); },
            saveDB: () => { State.db.routes[State.localActiveRoute] = State.stores; App.dbRef.set(State.db).then(() => UI.showSaveToast("บันทึกสำเร็จ")); },
            sync: () => { 
                let rs = document.getElementById('routeSelector');
                rs.innerHTML = Object.keys(State.db.routes).sort().map(r => `<option value="${r}">${r}</option>`).join('');
                rs.value = State.localActiveRoute;
                UI.render();
            },
            switchRoute: (n) => { State.localActiveRoute = n; State.stores = State.db.routes[n]; App.sync(); MapCtrl.fit(); },
            addRoute: () => { let n = prompt("ชื่อสายใหม่:"); if(n) { State.db.routes[n] = []; State.localActiveRoute = n; App.saveDB(); } },
            renameRoute: () => { let n = prompt("ชื่อใหม่:", State.localActiveRoute); if(n) { State.db.routes[n] = State.db.routes[State.localActiveRoute]; delete State.db.routes[State.localActiveRoute]; State.localActiveRoute = n; App.saveDB(); } }
        };

        const SalesData = {
            processExcel: (file) => {
                UI.showLoader("กำลังสกัดข้อมูลบิลและ SKU...");
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, {type: 'array'});
                        const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                        
                        let tempKPI = {};
                        json.forEach(row => {
                            let id = String(row['Customer Code'] || "").trim();
                            let inv = String(row['Invoice Number'] || "").trim();
                            let prod = String(row['SO Product Name'] || "").trim();
                            let qty = parseFloat(row['SO Total  QTY EA'] || 0);

                            if(!id) return;
                            if(!tempKPI[id]) tempKPI[id] = { vpo: 0, bills: new Set(), skus: new Set(), hasJelly: false, hasKlom: false };

                            tempKPI[id].vpo += qty;
                            if(inv) tempKPI[id].bills.add(inv);
                            if(prod) {
                                tempKPI[id].skus.add(prod);
                                if(prod.includes("เจลลี่")) tempKPI[id].hasJelly = true;
                                if(prod.includes("กลมกล่อม")) tempKPI[id].hasKlom = true;
                            }
                        });

                        // แปลง Set เป็นเลขจำนวน
                        let finalKPI = {};
                        Object.keys(tempKPI).forEach(id => {
                            finalKPI[id] = {
                                vpo: Math.round(tempKPI[id].vpo * 100) / 100,
                                billCount: tempKPI[id].bills.size,
                                skuCount: tempKPI[id].skus.size,
                                hasJelly: tempKPI[id].hasJelly,
                                hasKlom: tempKPI[id].hasKlom
                            };
                        });

                        App.salesRef.set(finalKPI).then(() => {
                            State.sales = finalKPI;
                            UI.hideLoader();
                            alert("✅ อัปเดตข้อมูลยอดขายละเอียดเรียบร้อย!");
                            App.sync();
                        });
                    } catch(err) { UI.hideLoader(); alert("Error: " + err.message); }
                };
                reader.readAsArrayBuffer(file);
            }
        };

        document.getElementById('salesUpload').addEventListener('change', (e) => SalesData.processExcel(e.target.files[0]));

        const UI = {
            showLoader: (txt) => { document.getElementById('loader-text').innerText = txt; document.getElementById('loader').style.display = 'flex'; },
            hideLoader: () => document.getElementById('loader').style.display = 'none',
            switchTab: (id) => { document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-'+id).classList.add('active'); document.querySelectorAll('div[id^="tab"]').forEach(d => d.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); },
            render: () => {
                let htmlU = [], htmlP = [];
                State.stores.forEach(s => {
                    let k = State.sales[s.id];
                    let badge = k ? `<span class="text-[9px] bg-emerald-100 text-emerald-700 px-1 rounded">📦 ${k.vpo} | 🎫 ${k.billCount} บิล</span>` : '';
                    let item = `<div class="p-3 bg-white border rounded-xl shadow-sm"><div class="flex justify-between font-bold text-sm"><span>${s.name}</span>${badge}</div><div class="text-[10px] text-gray-400">ID: ${s.id}</div></div>`;
                    htmlP.push(item);
                    if(!s.days.length) htmlU.push(`<label class="flex p-3 bg-white border rounded-xl"><input type="checkbox" onchange="StoreMgr.toggleSelect('${s.id}')" class="mr-2"> <div class="text-sm">${s.name}</div></label>`);
                });
                document.getElementById('list-upload').innerHTML = htmlP.join('');
                document.getElementById('list-unassigned').innerHTML = htmlU.join('');
                document.getElementById('stat-total').innerText = State.stores.length;
                MapCtrl.draw();
            },
            showSaveToast: (m) => { let t = document.getElementById('save-toast'); t.classList.remove('opacity-0'); setTimeout(() => t.classList.add('opacity-0'), 2000); }
        };

        const StoreMgr = {
            toggleSelect: (id) => { let s = State.stores.find(x=>x.id===id); if(s) s.selected = !s.selected; },
            assignSelected: () => { let d = document.getElementById('assign-day').value; State.stores.forEach(s => { if(s.selected) { s.days = [d]; s.selected = false; } }); App.saveDB(); }
        };

        const MapCtrl = {
            map: null, markers: {},
            init: () => { MapCtrl.map = L.map('map').setView([14.4745, 100.1222], 10); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(MapCtrl.map); },
            draw: () => {
                for(let id in MapCtrl.markers) MapCtrl.map.removeLayer(MapCtrl.markers[id]);
                State.stores.forEach(s => {
                    let color = s.days.length ? DAY_COLORS[s.days[0]].hex : '#cbd5e1';
                    MapCtrl.markers[s.id] = L.circleMarker([s.lat, s.lng], { radius: 8, color: '#fff', weight: 2, fillColor: color, fillOpacity: 0.8 }).addTo(MapCtrl.map).bindTooltip(s.name);
                });
            },
            fit: () => { if(State.stores.length) MapCtrl.map.fitBounds(L.latLngBounds(State.stores.map(s => [s.lat, s.lng]))); }
        };

        App.init();
    </script>
</body>
</html>
