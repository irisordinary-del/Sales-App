<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Admin (Full Classic Version)</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; overflow: hidden; }
        #map { height: 100%; width: 100%; z-index: 1; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .tab-btn { border-bottom: 2px solid transparent; color: #64748b; font-weight: 500; transition: all 0.2s; font-size: 13px; }
        .tab-btn.active { border-bottom: 2px solid #2563eb; color: #1e40af; font-weight: 700; }
        #loader { display: none; position: absolute; inset: 0; background: rgba(255,255,255,0.9); z-index: 99999; justify-content: center; align-items: center; flex-direction: column; backdrop-filter: blur(2px); }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #4f46e5; border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex flex-col h-screen relative">
    <div id="loader"><div class="spinner"></div><p id="loader-text" class="mt-4 font-bold text-indigo-700">กำลังประมวลผลข้อมูล...</p></div>

    <div class="h-16 bg-gray-900 text-white flex items-center justify-between px-6 shadow-md z-[5000] shrink-0 border-b-4 border-indigo-600">
        <div class="flex items-center gap-3">
            <h1 class="text-xl font-black text-indigo-400 mr-2">Route<span class="text-white">Admin</span></h1>
            <div class="flex items-center bg-gray-800 rounded-lg p-1 border border-gray-700">
                <select id="routeSelector" onchange="App.switchRoute(this.value)" class="bg-gray-900 text-white border-none text-sm font-bold py-1 px-2 outline-none cursor-pointer"></select>
                <div class="flex items-center border-l border-gray-700 ml-1 pl-1">
                    <button onclick="App.renameRoute()" class="hover:text-indigo-400 px-2 transition">✏️</button>
                    <button onclick="App.deleteRoute()" class="hover:text-red-400 px-2 transition">🗑️</button>
                </div>
            </div>
            <button onclick="App.addRoute()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-3 py-1.5 rounded text-xs font-bold shadow-sm">+ เพิ่มสาย</button>
        </div>
        <div id="db-status" class="text-[10px] font-bold px-3 py-1.5 rounded-lg border bg-emerald-900/20 text-emerald-400 border-emerald-800">✅ ระบบออนไลน์</div>
    </div>

    <div class="flex-1 flex overflow-hidden">
        <div class="w-2/3 relative h-full">
            <div id="map"></div>
            <div id="mapTools" class="absolute top-4 right-4 z-[400] flex flex-col gap-3">
                <button onclick="Lasso.toggle()" id="lassoBtn" class="bg-gray-900 text-white px-4 py-2.5 rounded-xl shadow-lg text-sm font-bold border border-gray-700 active:scale-95 transition">✏️ วาดเลือกพื้นที่</button>
            </div>
            <div id="lassoPanel" class="hidden absolute top-4 right-4 z-[400] bg-white p-4 rounded-2xl shadow-2xl border-2 border-gray-900 flex flex-col gap-3 w-64">
                <p class="text-sm font-black text-center">โหมดวาดพื้นที่</p>
                <button onclick="Lasso.finish()" class="bg-emerald-500 text-white py-2 rounded-xl font-bold">✅ ยืนยัน</button>
                <button onclick="Lasso.cancel()" class="bg-red-50 text-red-600 py-2 rounded-xl font-bold">❌ ยกเลิก</button>
            </div>
        </div>

        <div class="w-1/3 bg-white flex flex-col h-full z-10 border-l border-gray-200">
            <div class="flex border-b text-sm bg-gray-50 shrink-0">
                <button onclick="UI.switchTab('tab1')" id="btn-tab1" class="tab-btn active flex-1 py-4">1. ข้อมูล</button>
                <button onclick="UI.switchTab('tab2')" id="btn-tab2" class="tab-btn flex-1 py-4">2. จัดสาย</button>
                <button onclick="UI.switchTab('tab3')" id="btn-tab3" class="tab-btn flex-1 py-4">3. แก้ไข</button>
                <button onclick="UI.switchTab('tab4')" id="btn-tab4" class="tab-btn flex-1 py-4">4. สรุป</button>
            </div>

            <div class="flex-1 overflow-y-auto p-4">
                <div id="tab1" class="block space-y-4">
                    <div class="bg-indigo-50 border-2 border-dashed border-indigo-200 p-4 rounded-xl text-center cursor-pointer" onclick="document.getElementById('fileUpload').click()">📍 อัปโหลด Master (พิกัด)</div>
                    <input type="file" id="fileUpload" class="hidden">
                    <div class="bg-emerald-50 border-2 border-dashed border-emerald-200 p-4 rounded-xl text-center cursor-pointer" onclick="document.getElementById('salesUpload').click()">📊 อัปโหลด Sellout (ยอดขาย)</div>
                    <input type="file" id="salesUpload" class="hidden">
                    <div id="list-upload" class="space-y-2"></div>
                </div>
                <div id="tab2" class="hidden space-y-4">
                    <div class="bg-gray-900 text-white p-4 rounded-xl">
                        <p class="text-xs mb-2">🤖 AI Route Builder</p>
                        <button onclick="AI.run()" class="w-full bg-indigo-500 py-2 rounded-lg font-bold text-sm">✨ คำนวณสายอัตโนมัติ</button>
                    </div>
                    <div class="flex gap-2 sticky top-0 bg-white py-2 border-b">
                        <select id="assign-day" class="flex-1 p-2 border rounded-lg text-sm font-bold"></select>
                        <button onclick="StoreMgr.assignSelected()" class="bg-indigo-600 text-white px-4 rounded-lg font-bold text-sm">จัดลงวัน</button>
                    </div>
                    <div id="list-unassigned" class="space-y-2 mt-2"></div>
                </div>
                <div id="tab3" class="hidden"><div id="list-assigned" class="space-y-2"></div></div>
                <div id="tab4" class="hidden"><div id="list-summary" class="grid grid-cols-2 gap-2"></div></div>
            </div>

            <div class="p-4 border-t bg-white flex justify-between items-center">
                <div class="text-xs font-bold text-gray-500">ร้านทั้งหมด: <span id="stat-total" class="text-gray-900">0</span></div>
                <button onclick="ExcelIO.export()" class="bg-emerald-600 text-white px-4 py-2 rounded-lg text-xs font-bold">📥 โหลดแผนออก</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDCYxJf0eHryjVJ8_INoWw_uTN14UMaEWE", authDomain: "route-plan-71e2e.firebaseapp.com", projectId: "route-plan-71e2e", storageBucket: "route-plan-71e2e.firebasestorage.app", messagingSenderId: "486778971661", appId: "1:486778971661:web:2ef83fa1eeb09ec6665744" };
        firebase.initializeApp(firebaseConfig);
        const cloudDB = firebase.firestore();

        const DAY_COLORS = (() => {
            let colors = ["#ef4444", "#3b82f6", "#22c55e", "#f97316", "#a855f7", "#06b6d4", "#eab308", "#ec4899", "#14b8a6", "#84cc16"];
            let obj = {};
            for(let i=1; i<=30; i++) obj[`Day ${i}`] = { hex: colors[(i-1)%colors.length], name: `วันที่ ${i}` };
            return obj;
        })();

        let State = { db: { routes: {}, cycleDays: 24 }, sales: {}, localActiveRoute: null, stores: [] };

        const App = {
            dbRef: cloudDB.collection('appData').doc('v1_main'),
            salesRef: cloudDB.collection('appData').doc('v1_sales'),
            init: () => {
                MapCtrl.init(); UI.showLoader("กำลังเชื่อมต่อ...");
                App.dbRef.onSnapshot(doc => {
                    let data = doc.exists ? doc.data() : {};
                    State.db.routes = data.routes || {"V01": []};
                    if(!State.localActiveRoute) State.localActiveRoute = Object.keys(State.db.routes).sort()[0];
                    State.stores = State.db.routes[State.localActiveRoute] || [];
                    App.fetchSales();
                });
            },
            fetchSales: () => { App.salesRef.get().then(doc => { State.sales = doc.exists ? doc.data() : {}; UI.hideLoader(); UI.render(); }); },
            saveDB: () => { State.db.routes[State.localActiveRoute] = State.stores; App.dbRef.set(State.db); UI.render(); },
            switchRoute: (n) => { State.localActiveRoute = n; State.stores = State.db.routes[n]; UI.render(); MapCtrl.fit(); },
            addRoute: () => { let n = prompt("ชื่อสายใหม่:"); if(n) { State.db.routes[n] = []; State.localActiveRoute = n; App.saveDB(); } },
            renameRoute: () => { let n = prompt("ชื่อใหม่:", State.localActiveRoute); if(n) { State.db.routes[n] = State.db.routes[State.localActiveRoute]; delete State.db.routes[State.localActiveRoute]; State.localActiveRoute = n; App.saveDB(); } },
            deleteRoute: () => { if(confirm("ลบสายนี้?")) { delete State.db.routes[State.localActiveRoute]; State.localActiveRoute = Object.keys(State.db.routes)[0]; App.saveDB(); } }
        };

        const SalesData = {
            process: (file) => {
                UI.showLoader("กำลังวิเคราะห์ยอดขาย...");
                const reader = new FileReader();
                reader.onload = (e) => {
                    const workbook = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
                    const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                    let temp = {};
                    json.forEach(row => {
                        let id = String(row['Customer Code'] || "").trim();
                        if(!id) return;
                        if(!temp[id]) temp[id] = { vpo:0, bills:new Set(), skus:new Set(), hasJelly:false, hasKlom:false };
                        temp[id].vpo += parseFloat(row['SO Total  QTY EA'] || 0);
                        temp[id].bills.add(row['Invoice Number']);
                        let p = String(row['SO Product Name'] || "");
                        temp[id].skus.add(p);
                        if(p.includes("เจลลี่")) temp[id].hasJelly = true;
                        if(p.includes("กลมกล่อม")) temp[id].hasKlom = true;
                    });
                    let final = {};
                    Object.keys(temp).forEach(id => { final[id] = { vpo: Math.round(temp[id].vpo*100)/100, billCount: temp[id].bills.size, skuCount: temp[id].skus.size, hasJelly: temp[id].hasJelly, hasKlom: temp[id].hasKlom, active: temp[id].vpo>0 }; });
                    App.salesRef.set(final).then(() => { State.sales = final; UI.hideLoader(); alert("อัปโหลดสำเร็จ!"); UI.render(); });
                };
                reader.readAsArrayBuffer(file);
            }
        };

        const MapCtrl = {
            map: null, markers: {},
            init: () => { MapCtrl.map = L.map('map').setView([14.4745, 100.1222], 10); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(MapCtrl.map); },
            draw: () => {
                for(let id in MapCtrl.markers) MapCtrl.map.removeLayer(MapCtrl.markers[id]);
                State.stores.forEach(s => {
                    let color = s.days.length ? DAY_COLORS[s.days[0]].hex : '#cbd5e1';
                    MapCtrl.markers[s.id] = L.circleMarker([s.lat, s.lng], { radius: 8, color: s.selected ? '#000' : '#fff', weight: 2, fillColor: color, fillOpacity: 0.8 }).addTo(MapCtrl.map).on('click', () => { s.selected = !s.selected; UI.render(); });
                });
            },
            fit: () => { if(State.stores.length) MapCtrl.map.fitBounds(L.latLngBounds(State.stores.map(s=>[s.lat,s.lng]))); }
        };

        const UI = {
            showLoader: (t) => { document.getElementById('loader-text').innerText = t; document.getElementById('loader').style.display='flex'; },
            hideLoader: () => document.getElementById('loader').style.display='none',
            switchTab: (id) => { document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-'+id).classList.add('active'); document.querySelectorAll('div[id^="tab"]').forEach(d => d.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); },
            render: () => {
                let hU = [], hA = [], hP = [], sums = {};
                State.stores.forEach(s => {
                    let k = State.sales[s.id];
                    let badge = k ? `<span class="text-[9px] bg-emerald-100 px-1 rounded">📦 ${k.vpo}</span>` : '';
                    hP.push(`<div class="p-3 bg-white border rounded-xl flex justify-between"><span>${s.name}</span>${badge}</div>`);
                    if(!s.days.length) hU.push(`<label class="flex p-3 bg-white border ${s.selected?'border-blue-500 bg-blue-50':''} rounded-xl"><input type="checkbox" onchange="StoreMgr.toggleSelect('${s.id}')" ${s.selected?'checked':''} class="mr-2"> ${s.name}</label>`);
                    else { s.days.forEach(d => { sums[d] = (sums[d]||0)+1; }); hA.push(`<div class="p-3 bg-white border rounded-xl flex justify-between text-xs font-bold"><span>${s.name}</span><span style="color:${DAY_COLORS[s.days[0]].hex}">${s.days[0]}</span></div>`); }
                });
                document.getElementById('list-upload').innerHTML = hP.join('');
                document.getElementById('list-unassigned').innerHTML = hU.join('');
                document.getElementById('list-assigned').innerHTML = hA.join('');
                document.getElementById('stat-total').innerText = State.stores.length;
                document.getElementById('routeSelector').innerHTML = Object.keys(State.db.routes).sort().map(r => `<option value="${r}">${r}</option>`).join('');
                document.getElementById('routeSelector').value = State.localActiveRoute;
                document.getElementById('assign-day').innerHTML = Object.keys(DAY_COLORS).map(d => `<option value="${d}">${d}</option>`).join('');
                let hS = []; Object.keys(sums).forEach(d => hS.push(`<div class="p-4 bg-white border-t-4 rounded-xl shadow-sm text-center" style="border-color:${DAY_COLORS[d].hex}"><p class="text-[10px] text-gray-400">${d}</p><p class="text-2xl font-black" style="color:${DAY_COLORS[d].hex}">${sums[d]}</p></div>`));
                document.getElementById('list-summary').innerHTML = hS.join('');
                MapCtrl.draw();
            }
        };

        const StoreMgr = { toggleSelect: (id) => { let s = State.stores.find(x=>x.id===id); s.selected = !s.selected; UI.render(); }, assignSelected: () => { let d = document.getElementById('assign-day').value; State.stores.forEach(s => { if(s.selected) { s.days=[d]; s.selected=false; } }); App.saveDB(); } };
        const AI = { run: () => { State.stores.forEach((s,i) => { if(!s.days.length) s.days=[`Day ${(i%12)+1}`]; }); App.saveDB(); } };
        const ExcelIO = { export: () => { let ws = XLSX.utils.json_to_sheet(State.stores.map(s=>({id:s.id, name:s.name, days:s.days.join(',')}))), wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Plan"); XLSX.writeFile(wb, "Route.xlsx"); } };

        document.getElementById('salesUpload').addEventListener('change', e => SalesData.process(e.target.files[0]));
        document.getElementById('fileUpload').addEventListener('change', e => {
            const reader = new FileReader(); reader.onload = ev => {
                const workbook = XLSX.read(ev.target.result, {type:'array'});
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                State.stores = json.map(r => ({ id: String(r['Customer Code']||r['รหัส']), name: r['ชื่อ']||r['Name'], lat: parseFloat(r['Lat']), lng: parseFloat(r['Lng']), days: [], selected: false }));
                App.saveDB();
            }; reader.readAsArrayBuffer(e.target.files[0]);
        });

        App.init();
    </script>
</body>
</html>
