<!DOCTYPE html>

<html lang="th">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Route Planner Admin</title>



    <!-- Firebase (โหลดก่อน) -->

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>



    <!-- UI Libraries -->

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">



    <link rel="stylesheet" href="admin-style.css">

</head>

<body class="flex h-screen relative bg-slate-50">



    <!-- Loader -->

    <div id="loader">

        <div class="spinner"></div>

        <p id="loader-text" class="text-indigo-700 font-bold text-lg">กำลังประมวลผล...</p>

        <p id="loader-subtext" class="text-gray-500 text-sm mt-2 font-medium"></p>

    </div>



    <!-- Toast Notification -->

    <div id="save-toast" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 translate-y-24 opacity-0 bg-gray-900 text-white px-5 py-2.5 rounded-full shadow-2xl transition-all duration-300 z-[9999] text-sm font-bold flex items-center gap-2 pointer-events-none">

        <span id="toast-msg">บันทึกเรียบร้อย</span>

    </div>



    <!-- Sidebar -->

    <aside class="w-16 md:w-56 bg-slate-900 flex flex-col shrink-0 z-[6000] shadow-2xl transition-all">

        <div class="h-16 flex items-center justify-center bg-slate-950 border-b border-slate-800">

            <h1 class="text-xl font-black text-indigo-400 tracking-wider hidden md:block">

                R<span class="text-white">Admin</span>

            </h1>

        </div>

        <nav class="flex-1 py-4 space-y-1 overflow-hidden">

            <button onclick="Nav.go('planning')" id="nav-planning" class="sidebar-menu active w-full flex items-center px-4 md:px-5 py-3.5 text-sm font-bold">

                <span class="text-lg md:mr-3">📍</span>

                <span class="hidden md:inline">วางแผนคิวงาน</span>

            </button>

        </nav>

    </aside>



    <!-- Main Content -->

    <div class="flex-1 flex flex-col overflow-hidden relative">



        <!-- ===== PAGE: Planning ===== -->

        <div id="page-planning" class="flex-1 flex flex-col absolute inset-0">



            <!-- Header -->

            <div class="h-16 bg-gray-900 text-white flex items-center justify-between px-6 shadow-md z-[5000] relative shrink-0 border-b-4 border-indigo-600">

                <div class="flex items-center gap-3">

                    <h1 class="text-xl font-black tracking-wide text-indigo-400 mr-2 hidden sm:block">

                        Route<span class="text-white">Plan</span>

                    </h1>

                    <div class="flex items-center bg-gray-800 rounded-lg p-1 border border-gray-700">

                        <select id="routeSelector" onchange="App.switchRoute(this.value)"

                            class="bg-gray-900 text-white border-none text-sm focus:ring-0 outline-none font-bold py-1 px-2 rounded cursor-pointer max-w-[120px] sm:max-w-[200px]">

                        </select>

                        <div class="flex items-center border-l border-gray-700 ml-1 pl-1">

                            <button onclick="App.renameRoute()" class="text-gray-400 hover:text-white px-2 py-1 transition">✏️</button>

                            <button onclick="App.deleteRoute()" class="text-gray-400 hover:text-red-400 px-2 py-1 transition">🗑️</button>

                        </div>

                    </div>

                    <button onclick="App.addRoute()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-3 py-1.5 rounded-md text-xs font-bold shadow-sm transition">

                        + เพิ่มสาย

                    </button>

                </div>

                <div class="flex items-center gap-3">

                    <button onclick="UI.showSummaryModal()" class="bg-gray-800 border border-gray-600 hover:bg-gray-700 px-4 py-1.5 rounded-lg text-sm font-bold shadow-md transition flex items-center gap-2 text-white">

                        📊 ภาพรวม

                    </button>

                </div>

            </div>



            <!-- Map + Sidebar Panel -->

            <div class="flex-1 flex overflow-hidden">



                <!-- Map Area -->

                <div class="w-2/3 relative h-full">

                    <div id="map"></div>



                    <!-- Fit to stores button -->

                    <button onclick="MapCtrl.fitToStores()" class="absolute bottom-6 right-6 z-[400] bg-white p-3 rounded-xl shadow-lg border border-gray-200 text-indigo-600 hover:bg-indigo-50 transition">

                        🗺️

                    </button>



                    <!-- Clear road button -->

                    <button id="clearRoadBtn" onclick="MapCtrl.clearRoad()" class="hidden absolute top-4 left-4 z-[400] bg-white text-red-600 font-bold px-4 py-2 rounded-xl shadow-lg border border-red-200">

                        ✕ ซ่อนเส้นทาง

                    </button>



                    <!-- Map Tools -->

                    <div id="mapTools" class="absolute top-4 right-4 z-[400] flex flex-col gap-3 items-end">

                        <div class="bg-white px-3 py-2 rounded-xl shadow-lg border border-gray-200 flex items-center gap-2">

                            <input type="checkbox" id="toggleLines" onchange="MapCtrl.drawLines()" class="w-5 h-5 text-indigo-600">

                            <label for="toggleLines" class="text-sm font-bold text-gray-800">🔗 เส้นโยงร้าน</label>

                        </div>

                        <button onclick="Lasso.toggle()" class="bg-gray-900 hover:bg-black text-white px-4 py-2.5 rounded-xl shadow-lg text-sm font-bold">

                            ✏️ วาดเลือกพื้นที่

                        </button>

                    </div>



                    <!-- Lasso Panel -->

                    <div id="lassoPanel" class="hidden absolute top-4 right-4 z-[400] bg-white p-4 rounded-2xl shadow-2xl border-2 border-gray-900 flex flex-col gap-3 w-64">

                        <p class="text-xs font-bold text-gray-500 text-center">คลิกบนแผนที่เพื่อวาดพื้นที่เลือกร้าน</p>

                        <button onclick="Lasso.finish()" class="bg-emerald-500 text-white py-2.5 rounded-xl text-sm font-bold shadow-md">✅ ยืนยัน</button>

                        <button onclick="Lasso.cancel()" class="bg-red-50 text-red-600 py-2 rounded-xl text-sm font-bold">❌ ยกเลิก</button>

                    </div>

                </div>



                <!-- Right Panel -->

                <div class="w-1/3 bg-white shadow-[-5px_0_15px_rgba(0,0,0,0.05)] flex flex-col h-full z-10 border-l border-gray-200">



                    <!-- Tabs Header -->

                    <div class="flex border-b border-gray-200 text-sm bg-gray-50 shrink-0">

                        <button onclick="UI.switchTab('tab1')" id="btn-tab1" class="tab-btn active flex-1 py-3 px-1">1. ข้อมูล</button>

                        <button onclick="UI.switchTab('tab2')" id="btn-tab2" class="tab-btn flex-1 py-3 px-1">2. จัดสาย</button>

                        <button onclick="UI.switchTab('tab3')" id="btn-tab3" class="tab-btn flex-1 py-3 px-1">3. แก้ไข</button>

                        <button onclick="UI.switchTab('tab4')" id="btn-tab4" class="tab-btn flex-1 py-3 px-1">4. สรุป</button>

                    </div>



                    <!-- Tab Contents -->

                    <div class="flex-1 overflow-y-auto p-4 bg-gray-50/50">



                        <!-- Tab 1: ข้อมูลพิกัด -->

                        <div id="tab1" class="block space-y-5">

                            <div class="bg-white p-4 rounded-2xl border border-gray-200 shadow-sm">

                                <h3 class="font-bold text-sm text-gray-800 mb-2">📍 ข้อมูลพิกัดร้านค้า (Master Data)</h3>

                                <div onclick="document.getElementById('fileUpload').click()" class="border-2 border-dashed border-indigo-300 bg-indigo-50 rounded-xl p-4 text-center cursor-pointer mb-3 hover:bg-indigo-100 transition">

                                    <p class="text-xl mb-1">📂</p>

                                    <p class="text-xs text-indigo-800 font-bold">อัปโหลดไฟล์แผนที่ (.xlsx)</p>

                                    <p class="text-[10px] text-indigo-500 mt-1">ต้องมีคอลัมน์: รหัส, ชื่อ, Lat, Lng</p>

                                </div>

                                <input type="file" id="fileUpload" accept=".xlsx,.xls,.csv" class="hidden">

                                <div class="flex gap-2">

                                    <button onclick="App.clearStores()" class="flex-1 bg-red-50 text-red-600 py-2 rounded-lg text-xs font-bold border border-red-100 hover:bg-red-100 transition">

                                        🗑️ ล้างสายนี้

                                    </button>

                                    <button onclick="StoreMgr.clearSelection()" class="flex-1 bg-gray-100 text-gray-700 py-2 rounded-lg text-xs font-bold border border-gray-200 hover:bg-gray-200 transition">

                                        ยกเลิกเลือก

                                    </button>

                                </div>

                            </div>

                            <input type="text" onkeyup="UI.filterList('list-upload', this.value)" placeholder="🔍 ค้นหาร้าน..." class="w-full p-2.5 border border-gray-300 rounded-xl text-sm outline-none shadow-inner">

                            <div id="list-upload" class="space-y-2 mt-2"></div>

                        </div>



                        <!-- Tab 2: จัดสาย -->

                        <div id="tab2" class="hidden space-y-4">

                            <!-- AI Builder -->

                            <div class="bg-indigo-50 p-4 rounded-2xl border border-indigo-100 shadow-sm">

                                <h3 class="font-black text-indigo-900 text-sm mb-3">🤖 AI Route Builder</h3>

                                <div class="flex justify-between mb-2">

                                    <label class="text-xs font-bold text-gray-700">จำนวนวันทั้งหมด:</label>

                                    <input type="number" id="ai-days" value="24" min="4" step="2" class="w-16 p-1 border border-indigo-200 rounded-lg text-center font-bold text-indigo-800 bg-white">

                                </div>

                                <div class="flex justify-between mb-2">

                                    <label class="text-xs font-bold text-gray-700 flex items-center gap-2">

                                        <input type="checkbox" id="ai-outlier" checked class="w-3.5 h-3.5">

                                        ตัดร้านโดด (กม.):

                                    </label>

                                    <input type="number" id="ai-dist" value="5" min="1" class="w-16 p-1 border border-indigo-200 rounded-lg text-center font-bold text-red-600 bg-white">

                                </div>

                                <div class="flex justify-between mb-3 border-t border-indigo-200 pt-2">

                                    <label class="text-xs font-bold text-gray-700 flex items-center gap-2">

                                        <input type="checkbox" id="ai-lock" class="w-3.5 h-3.5">

                                        ล็อคร้านที่จัดแล้ว

                                    </label>

                                </div>

                                <button onclick="AI.run()" class="w-full bg-gray-900 hover:bg-black text-white py-2.5 rounded-xl font-bold text-sm shadow-md transition">

                                    ✨ เริ่มคำนวณ AI

                                </button>

                            </div>



                            <!-- Assign Day -->

                            <div class="flex gap-2 sticky top-0 bg-gray-50/90 backdrop-blur-sm pb-2 pt-2 z-10 border-b">

                                <select id="assign-day" class="flex-1 p-2 border border-gray-300 rounded-xl text-sm font-bold outline-none"></select>

                                <button onclick="StoreMgr.assignSelected()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 rounded-xl text-sm font-bold transition">

                                    จัดลงวัน

                                </button>

                                <button onclick="App.clearAllAssignments()" class="bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 px-4 rounded-xl text-sm font-bold transition">

                                    🗑️ เคลียร์

                                </button>

                            </div>



                            <div id="list-unassigned" class="space-y-2 mt-2 pb-10"></div>

                        </div>



                        <!-- Tab 3: แก้ไข -->

                        <div id="tab3" class="hidden space-y-4">

                            <div class="sticky top-0 bg-gray-50/90 backdrop-blur-sm pb-2 pt-1 z-10 border-b">

                                <input type="text" id="search-edit" onkeyup="UI.filterList('list-assigned', this.value)" placeholder="🔍 ค้นหาร้านที่จัดแล้ว..." class="w-full p-2.5 border border-gray-300 rounded-xl text-sm outline-none">

                            </div>

                            <div id="list-assigned" class="space-y-2 mt-2 pb-10"></div>

                        </div>



                        <!-- Tab 4: สรุป -->

                        <div id="tab4" class="hidden space-y-4">

                            <div id="list-summary" class="grid grid-cols-2 gap-3 mt-2 pb-10"></div>

                        </div>

                    </div>



                    <!-- Stats Bar -->

                    <div class="w-full bg-gray-200 h-1.5">

                        <div id="progress-bar" class="bg-emerald-500 h-1.5 w-0"></div>

                    </div>

                    <div class="p-4 bg-white border-t border-gray-200 flex justify-between items-center shadow-[0_-5px_15px_rgba(0,0,0,0.05)] z-20 shrink-0">

                        <div class="flex gap-4">

                            <div class="text-center">

                                <p class="text-gray-500 text-[10px] font-bold">รวม</p>

                                <p id="stat-total" class="text-lg font-black leading-none text-gray-800">0</p>

                            </div>

                            <div class="text-center">

                                <p class="text-yellow-600 text-[10px] font-bold">รอจัด</p>

                                <p id="stat-pending" class="text-lg font-black leading-none text-yellow-600">0</p>

                            </div>

                            <div class="text-center">

                                <p class="text-emerald-600 text-[10px] font-bold">Visit</p>

                                <p id="stat-done" class="text-lg font-black leading-none text-indigo-600">0</p>

                            </div>

                        </div>

                        <button onclick="ExcelIO.export()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2.5 rounded-xl text-sm font-bold transition">

                            📥 โหลดไฟล์ออก

                        </button>

                    </div>

                </div>

            </div>

        </div>





    </div><!-- end main -->



    <!-- ===== MODALS ===== -->



    <!-- Overall Summary Modal -->

    <div id="overallModal" class="hidden fixed inset-0 bg-gray-900/60 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">

        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-2xl max-h-[85vh] flex flex-col overflow-hidden">

            <div class="p-5 border-b flex justify-between items-center bg-gray-50">

                <h2 class="text-lg font-black text-gray-800">📊 สรุปความคืบหน้า</h2>

                <button onclick="UI.hideSummaryModal()" class="w-8 h-8 rounded-full border border-gray-300 text-gray-500 hover:bg-gray-100 font-bold transition">✕</button>

            </div>

            <div class="p-4 flex-1 overflow-y-auto bg-white">

                <table class="w-full text-sm text-left">

                    <thead class="text-xs text-gray-500 bg-gray-50 border-b">

                        <tr>

                            <th class="px-4 py-3">สายวิ่ง</th>

                            <th class="px-4 py-3 text-center">รวม</th>

                            <th class="px-4 py-3 text-center text-emerald-600">จัดแล้ว</th>

                            <th class="px-4 py-3 text-center text-yellow-600">รอจัด</th>

                            <th class="px-4 py-3 text-center">%</th>

                        </tr>

                    </thead>

                    <tbody id="overallTableBody"></tbody>

                </table>

            </div>

        </div>

    </div>



    <!-- Day Modal (คลิกดูร้านในวัน) -->

    <div id="dayModal" class="hidden fixed inset-0 bg-gray-900/60 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">

        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-lg max-h-[80vh] flex flex-col overflow-hidden">

            <div class="p-4 bg-gray-50 border-b flex justify-between items-center">

                <h2 id="modalTitle" class="text-xl font-black flex items-center gap-2">Day</h2>

                <button onclick="UI.closeDayModal()" class="bg-white border w-8 h-8 rounded-full font-bold hover:bg-gray-100 transition">✕</button>

            </div>

            <div id="modalContent" class="p-4 flex-1 overflow-y-auto space-y-2 bg-gray-50/50"></div>

        </div>

    </div>



    <!-- ===== SCRIPTS (ลำดับสำคัญมาก) ===== -->

    <!-- 1. Config + Firebase + State (ต้องก่อนสุด) -->

    <script src="app-config.js"></script>

    <!-- 2. UI (ต้องก่อน Map เพราะ Map เรียก UI.focusOnEditTab) -->

    <script src="admin-ui.js"></script>

    <!-- 3. Map + Lasso -->

    <script src="admin-map.js"></script>

    <!-- 4. Data: StoreMgr, App, FileManager -->

    <script src="admin-data.js"></script>

    <!-- 5. AI (ต้องหลัง StoreMgr) -->

    <script src="admin-ai.js"></script>

    <script src="file-manager.js"></script>

    <!-- 6. Init -->

    <script>

        // App is defined in admin-data.js

        document.addEventListener('DOMContentLoaded', () => { 

            if (App && App.init) App.init();

        });

    </script>

</body>

</html>
