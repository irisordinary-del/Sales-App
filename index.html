<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Planner Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; }
        #map { height: 100%; width: 100%; z-index: 1; }
        .sidebar-menu.active { background-color: #1e293b; color: #38bdf8; border-right: 4px solid #38bdf8; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">
    <aside class="w-64 bg-[#0f172a] text-slate-300 flex flex-col shadow-xl z-50">
        <div class="p-6"><h1 class="text-2xl font-black text-white italic">RoutePlan</h1></div>
        <nav class="flex-1 mt-2">
            <button id="nav-planning" onclick="Nav.go('planning')" class="sidebar-menu active w-full flex items-center gap-3 px-6 py-4 hover:bg-slate-800 transition">📍 วางแผนคิวงาน</button>
            <button id="nav-data" onclick="Nav.go('data')" class="sidebar-menu w-full flex items-center gap-3 px-6 py-4 hover:bg-slate-800 transition">📂 ข้อมูลการขาย</button>
        </nav>
        <div id="db-status" class="p-4 text-[10px] text-center font-bold"></div>
    </aside>

    <main class="flex-1 flex flex-col relative overflow-hidden">
        <header class="h-16 bg-[#0f172a] border-b border-slate-800 flex items-center justify-between px-6 z-40 text-white">
            <div class="flex items-center gap-4">
                <span class="font-bold">สายวิ่ง:</span>
                <select id="routeSelector" onchange="App.switchRoute(this.value)" class="bg-slate-800 p-2 rounded-lg text-sm font-bold outline-none border border-slate-700"></select>
                <button onclick="App.addRoute()" class="bg-indigo-600 hover:bg-indigo-500 px-3 py-2 rounded-lg text-xs font-bold">+ เพิ่มสาย</button>
            </div>
            <button onclick="UI.showSummaryModal()" class="bg-slate-800 border border-slate-700 px-4 py-2 rounded-xl text-xs hover:bg-slate-700">📊 ภาพรวม</button>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <div id="page-planning" class="flex-1 relative flex overflow-hidden">
                <div id="map"></div>
                <div id="lassoPanel" class="hidden absolute top-6 left-1/2 -translate-x-1/2 z-[1000] flex gap-2">
                    <button onclick="Lasso.finish()" class="bg-emerald-600 text-white px-6 py-2.5 rounded-full font-bold shadow-2xl hover:bg-emerald-500">✨ ตกลงเลือก</button>
                    <button onclick="Lasso.cancel()" class="bg-white text-gray-700 px-6 py-2.5 rounded-full font-bold shadow-2xl hover:bg-gray-100">ยกเลิก</button>
                </div>
                <div class="absolute top-6 right-6 z-[1000] flex flex-col gap-3">
                    <button onclick="Lasso.toggle()" class="bg-gray-900 text-white p-3 rounded-xl font-bold text-xs shadow-xl hover:scale-105 transition">🖌️ วาดเลือกพื้นที่</button>
                </div>
            </div>

            <section class="w-[400px] bg-white border-l flex flex-col shadow-inner z-30">
                <div class="flex border-b bg-gray-50 p-2 gap-1">
                    <button id="btn-tab1" onclick="UI.switchTab('tab1')" class="tab-btn active flex-1 py-2 text-xs font-bold rounded-lg border-b-2 border-indigo-600 text-indigo-800">1. ค้นหา</button>
                    <button id="btn-tab2" onclick="UI.switchTab('tab2')" class="tab-btn flex-1 py-2 text-xs font-bold text-gray-400">2. จัดสาย</button>
                    <button id="btn-tab3" onclick="UI.switchTab('tab3')" class="tab-btn flex-1 py-2 text-xs font-bold text-gray-400">3. สรุป</button>
                </div>

                <div class="flex-1 overflow-y-auto p-4 no-scrollbar">
                    <div id="tab1" class="block space-y-4">
                        <div class="p-6 bg-indigo-50 border-2 border-dashed border-indigo-200 rounded-2xl text-center relative hover:bg-indigo-100 transition">
                            <input type="file" id="fileUpload" class="absolute inset-0 opacity-0 cursor-pointer">
                            <p class="text-xs font-bold text-indigo-700">📁 อัปโหลดไฟล์ Excel (.xlsx)</p>
                        </div>
                        <input type="text" onkeyup="UI.filterList('list-upload', this.value)" placeholder="ค้นหาร้าน..." class="w-full p-3 bg-gray-100 rounded-xl text-xs outline-none focus:ring-2 focus:ring-indigo-400">
                        <div id="list-upload" class="space-y-2"></div>
                    </div>

                    <div id="tab2" class="hidden space-y-4">
                        <div class="p-4 bg-indigo-600 rounded-2xl shadow-lg text-white">
                            <label class="text-[10px] font-bold uppercase mb-2 block">จัดลงคิววิ่ง:</label>
                            <div class="flex gap-2">
                                <select id="assign-day" class="flex-1 p-2 rounded-xl bg-white text-gray-800 text-sm font-bold"></select>
                                <button onclick="StoreMgr.assignSelected()" class="bg-emerald-400 text-emerald-900 px-6 rounded-xl font-black hover:bg-white transition">ยืนยัน</button>
                            </div>
                        </div>
                        <div id="list-unassigned" class="space-y-2"></div>
                    </div>

                    <div id="tab3" class="hidden"><div id="list-summary" class="grid grid-cols-2 gap-2"></div></div>
                </div>

                <div class="p-4 bg-gray-50 border-t">
                    <div class="flex justify-between items-center mb-2">
                        <div id="stat-count" class="text-[10px] font-bold text-gray-500">ร้านทั้งหมด: 0</div>
                        <button onclick="ExcelIO.export()" class="bg-emerald-600 text-white px-4 py-2 rounded-xl text-[10px] font-bold shadow-lg hover:bg-emerald-500">📥 โหลดไฟล์ออก</button>
                    </div>
                    <div class="w-full h-1.5 bg-gray-200 rounded-full overflow-hidden"><div id="progress-bar" class="h-full bg-emerald-500 w-0 transition-all duration-500"></div></div>
                </div>
            </section>
        </div>
    </main>

    <div id="loader" class="hidden fixed inset-0 z-[9999] bg-slate-900/80 backdrop-blur flex flex-col items-center justify-center text-white">
        <div class="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p id="loader-text" class="font-bold"></p>
    </div>

    <div id="dayModal" class="hidden fixed inset-0 z-[2000] bg-black/60 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-3xl overflow-hidden shadow-2xl">
            <div id="modalTitle" class="p-6 border-b font-black text-lg"></div>
            <div id="modalContent" class="p-4 max-h-80 overflow-y-auto no-scrollbar"></div>
            <div class="p-4 bg-gray-50 flex gap-2">
                <button onclick="OSRM.generate()" class="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-bold shadow-lg">🚗 วาดถนนจริง</button>
                <button onclick="UI.closeDayModal()" class="px-6 py-3 bg-white border rounded-xl font-bold">ปิด</button>
            </div>
        </div>
    </div>

    <div id="overallModal" class="hidden fixed inset-0 z-[2000] bg-black/60 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl rounded-3xl shadow-2xl flex flex-col max-h-[85vh]">
            <div class="p-6 border-b flex justify-between items-center">
                <h3 class="font-black text-xl">ภาพรวมทุกสายวิ่ง</h3>
                <button onclick="UI.hideSummaryModal()" class="text-gray-400 text-2xl">✕</button>
            </div>
            <div class="flex-1 overflow-y-auto p-0">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50">
                        <tr><th class="p-4 text-[10px] text-gray-500">สายวิ่ง</th><th class="p-4 text-center text-[10px] text-gray-500">ทั้งหมด</th><th class="p-4 text-center text-[10px] text-gray-500">จัดแล้ว</th><th class="p-4 text-center text-[10px] text-gray-500">%</th></tr>
                    </thead>
                    <tbody id="overallTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <script src="app-config.js"></script>
    <script src="admin-data.js?v=orig"></script>
    <script src="admin-map.js?v=orig"></script>
    <script src="admin-ui.js?v=orig"></script>

    <script>
        window.addEventListener('DOMContentLoaded', () => { if (typeof App !== 'undefined' && App.init) App.init(); });
    </script>
</body>
</html>
