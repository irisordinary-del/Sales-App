<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Planner Admin</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="admin-style.css">
    
    <style>
        body { font-family: 'Prompt', sans-serif; }
        #map { width: 100%; height: 100%; }
    </style>
</head>
<body class="flex h-screen bg-slate-50">

    <!-- LOGIN SCREEN -->
    <div id="login-container" class="w-full h-full flex items-center justify-center bg-gradient-to-br from-indigo-600 to-purple-700">
        <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full">
            <h1 class="text-3xl font-black text-center mb-8">🚗 RouteAdmin</h1>
            <div class="space-y-4">
                <input type="email" id="login-email" placeholder="Email" class="w-full px-4 py-2 border rounded-lg">
                <input type="password" id="login-password" placeholder="Password" class="w-full px-4 py-2 border rounded-lg">
                <button onclick="Auth.login(document.getElementById('login-email').value, document.getElementById('login-password').value)" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold">Login</button>
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="app-container" class="hidden w-full h-full flex">
        <aside class="w-56 bg-slate-900 flex flex-col text-white">
            <div class="h-16 flex items-center px-4 border-b border-slate-800">
                <h1 class="font-black">RouteAdmin</h1>
            </div>
            <nav class="flex-1 py-4 space-y-1">
                <button onclick="Nav.go('dashboard')" class="sidebar-menu w-full px-4 py-3 text-left">📊 Dashboard</button>
                <button onclick="Nav.go('planning')" class="sidebar-menu w-full px-4 py-3 text-left">📍 วางแผนคิวงาน</button>
                <button onclick="Nav.go('sales-data')" class="sidebar-menu w-full px-4 py-3 text-left">📦 ข้อมูลการขาย</button>
            </nav>
            <div class="p-4 border-t border-slate-800">
                <button onclick="Auth.logout()" class="w-full bg-red-600 py-2 rounded font-bold">Logout</button>
            </div>
        </aside>

        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- DASHBOARD PAGE -->
            <div id="page-dashboard" class="flex-1 overflow-y-auto">
                <div class="h-16 bg-gray-900 text-white flex items-center px-6 border-b-4 border-indigo-600">
                    <h1 class="text-xl font-black">📊 Dashboard</h1>
                </div>
                <div id="dashboard-content" class="p-6"></div>
            </div>

            <!-- PLANNING PAGE -->
            <div id="page-planning" class="hidden flex-1 flex flex-col">
                <div class="h-16 bg-gray-900 text-white flex items-center justify-between px-6 border-b-4 border-indigo-600">
                    <div class="flex items-center gap-3">
                        <h1 class="text-xl font-black">RoutePlan</h1>
                        <select id="routeSelector" onchange="App.switchRoute(this.value)" class="bg-gray-800 text-white px-3 py-1 rounded">
                            <option value="">เลือกสาย...</option>
                        </select>
                        <button onclick="App.addRoute()" class="bg-indigo-600 text-white px-3 py-1 rounded text-sm font-bold">+ เพิ่ม</button>
                    </div>
                    <button onclick="UI.showSummaryModal()" class="bg-gray-800 px-4 py-1 rounded text-sm font-bold">📊 ภาพรวม</button>
                </div>

                <div class="flex-1 flex overflow-hidden">
                    <div class="w-2/3 relative">
                        <div id="map"></div>
                    </div>

                    <div class="w-1/3 bg-white border-l border-gray-200 flex flex-col">
                        <div class="flex border-b text-sm bg-gray-50">
                            <button onclick="UI.switchTab('tab1')" class="tab-btn active flex-1 py-3">1. ข้อมูล</button>
                            <button onclick="UI.switchTab('tab2')" class="tab-btn flex-1 py-3">2. จัดสาย</button>
                            <button onclick="UI.switchTab('tab3')" class="tab-btn flex-1 py-3">3. แก้ไข</button>
                            <button onclick="UI.switchTab('tab4')" class="tab-btn flex-1 py-3">4. สรุป</button>
                        </div>
                        
                        <div class="flex-1 overflow-y-auto p-4 space-y-4">
                            <div id="tab1" class="block space-y-4">
                                <div class="bg-indigo-50 p-4 rounded-xl border border-indigo-200">
                                    <h3 class="font-bold mb-3">📍 อัปโหลดไฟล์แผนที่</h3>
                                    <input type="file" id="fileUpload" accept=".xlsx" class="hidden">
                                    <button onclick="document.getElementById('fileUpload').click()" class="w-full bg-indigo-600 text-white py-2 rounded-lg font-bold">📂 เลือกไฟล์</button>
                                </div>
                                <div id="list-upload" class="space-y-2"></div>
                            </div>
                            <div id="tab2" class="hidden space-y-4">
                                <button onclick="AI.run()" class="w-full bg-gray-900 text-white py-2 rounded-lg font-bold">✨ เริ่มคำนวณ AI</button>
                                <div id="list-unassigned" class="space-y-2"></div>
                            </div>
                            <div id="tab3" class="hidden space-y-4">
                                <input type="text" id="search-edit" placeholder="ค้นหา..." class="w-full p-2 border rounded">
                                <div id="list-assigned" class="space-y-2"></div>
                            </div>
                            <div id="tab4" class="hidden space-y-4">
                                <div id="list-summary" class="grid grid-cols-2 gap-3"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- SALES DATA PAGE -->
            <div id="page-sales-data" class="hidden flex-1 flex flex-col">
                <div class="h-16 bg-gray-900 text-white flex items-center px-6 border-b-4 border-indigo-600">
                    <h1 class="text-xl font-black">📦 ข้อมูลการขาย</h1>
                </div>
                <div id="sales-content" class="flex-1 overflow-y-auto p-6"></div>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="app-config.js"></script>
    <script src="admin-data.js"></script>
    <script src="admin-map.js"></script>
    <script src="admin-ai.js"></script>
    <script src="admin-ui.js"></script>
    <script src="FEATURES_IMPLEMENTATION.js"></script>

    <!-- BUILT-IN FUNCTIONS -->
    <script>
        // Initialize App object
        if (!window.App) window.App = {};

        // Upload and parse Excel file
        window.App.uploadAndParseFile = async function(file) {
            if (!file) return;
            try {
                UI.showLoader('กำลังอ่านไฟล์...', file.name);
                const arrayBuffer = await file.arrayBuffer();
                const workbook = XLSX.read(arrayBuffer, { header: 'A' });
                const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(worksheet, { header: 'A' });
                
                let stores = [];
                rows.forEach((row, idx) => {
                    if (!row.B || idx === 0) return;
                    
                    const lat = parseFloat(row.I);
                    const lng = parseFloat(row.J);
                    
                    if (isNaN(lat) || isNaN(lng)) {
                        console.warn(`Row ${idx}: Missing lat/long for ${row.C}`);
                        return;
                    }
                    
                    stores.push({
                        id: row.B,
                        code: row.B,
                        name: row.C || '',
                        salesCode: row.D || '',
                        shopType: row.E || '',
                        subDistrict: row.F || '',
                        district: row.G || '',
                        province: row.H || '',
                        lat: lat,
                        lng: lng,
                        marketName: row.K || '',
                        dayOriginal: row.L || '',
                        days: [],
                        seqs: {},
                        freq: 1,
                        selected: false
                    });
                });
                
                if (stores.length === 0) {
                    UI.hideLoader();
                    UI.showSaveToast('⚠️ ไม่พบข้อมูลร้านค้า');
                    return;
                }
                
                const routeName = `Route_${stores[0].salesCode?.substring(0, 3) || 'NEW'}`;
                State.db.routes[routeName] = stores;
                State.localActiveRoute = routeName;
                State.stores = stores;
                
                if (App.refreshRouteSelector) App.refreshRouteSelector();
                if (App.saveDB) await App.saveDB();
                
                UI.hideLoader();
                UI.showSaveToast(`✅ อัพโหลด: ${stores.length} แถว`);
                UI.render();
                
                setTimeout(() => {
                    if (MapCtrl && MapCtrl.map) MapCtrl.fitToStores();
                }, 500);
                
            } catch(err) {
                UI.hideLoader();
                console.error('❌ Upload error:', err);
                UI.showSaveToast('❌ อ่านไฟล์ไม่สำเร็จ');
            }
        };

        // Save to Firestore
        window.App.saveDB = async function() {
            try {
                const db = firebase.firestore();
                for (let routeName in State.db.routes) {
                    const stores = State.db.routes[routeName];
                    if (!stores || stores.length === 0) continue;
                    
                    const routeRef = db.collection('appData').doc('v1_main').collection('routes').doc(routeName);
                    await routeRef.set({
                        routeName: routeName,
                        storeCount: stores.length,
                        stores: stores,
                        updatedAt: new Date()
                    }, { merge: true });
                    
                    console.log(`✅ Saved: ${routeName}`);
                }
            } catch(err) {
                console.error('❌ Save error:', err);
            }
        };

        // Load routes from Firestore
        window.App.loadRoutes = async function() {
            try {
                console.log('📂 Loading routes...');
                const db = firebase.firestore();
                const snapshot = await db.collection('appData').doc('v1_main').collection('routes').get();
                
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if (data && data.stores && Array.isArray(data.stores)) {
                        State.db.routes[doc.id] = data.stores;
                    }
                });
                
                const routes = Object.keys(State.db.routes);
                if (routes.length > 0) {
                    State.localActiveRoute = routes[0];
                    State.stores = State.db.routes[routes[0]];
                }
                
                if (App.refreshRouteSelector) App.refreshRouteSelector();
                console.log(`✅ ${routes.length} routes loaded`);
            } catch(err) {
                console.error('❌ Load error:', err);
            }
        };

        // Refresh route selector
        window.App.refreshRouteSelector = function() {
            const selector = document.getElementById('routeSelector');
            if (!selector) return;
            selector.innerHTML = '<option value="">เลือกสาย...</option>' + 
                Object.keys(State.db.routes)
                    .sort()
                    .map(r => `<option value="${r}" ${r === State.localActiveRoute ? 'selected' : ''}>${r}</option>`)
                    .join('');
        };

        // Switch route
        window.App.switchRoute = function(routeName) {
            if (!routeName || !State.db.routes[routeName]) return;
            State.localActiveRoute = routeName;
            State.stores = State.db.routes[routeName];
            UI.render();
            if (MapCtrl && MapCtrl.map) setTimeout(() => MapCtrl.fitToStores(), 100);
        };

        // Add route
        window.App.addRoute = function() {
            const name = prompt('ชื่อสาย:');
            if (!name) return;
            if (State.db.routes[name]) { alert('มีแล้ว'); return; }
            State.db.routes[name] = [];
            State.localActiveRoute = name;
            State.stores = [];
            App.refreshRouteSelector();
            App.saveDB();
            UI.render();
        };

        // Clear stores
        window.App.clearStores = function() {
            if (!confirm('ยืนยัน?')) return;
            State.db.routes[State.localActiveRoute] = [];
            State.stores = [];
            App.saveDB();
            UI.render();
        };

        // Initialize on load
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                if (MapCtrl && !MapCtrl.map) MapCtrl.init();
                if (Auth) Auth.init();
                if (Mobile) Mobile.init();
                if (App.loadRoutes) App.loadRoutes();
            }, 1000);
        });

        // File upload handler
        document.getElementById('fileUpload')?.addEventListener('change', (e) => {
            if(e.target.files[0]) App.uploadAndParseFile(e.target.files[0]);
        });

        console.log('✅ All systems ready');
    </script>

</body>
</html>
