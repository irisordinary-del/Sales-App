<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sales App (Full Restoration)</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f3f4f6; margin: 0; overflow: hidden; }
        .app-tab { display: none; height: 100%; overflow-y: auto; padding-bottom: 80px; }
        .app-tab.active { display: block; }
        #tab-route.active { display: flex; flex-direction: column; }
        .nav-item { color: #94a3b8; }
        .nav-item.active { color: #2563eb; }
        #login-screen { position: fixed; inset: 0; background: #1e3a8a; z-index: 90000; display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div id="login-screen">
        <div class="bg-white p-8 rounded-3xl w-full max-w-sm text-center shadow-2xl">
            <h1 class="text-2xl font-black mb-6 text-blue-600 tracking-tighter">Sales Nav</h1>
            <input type="text" id="login-input" placeholder="รหัสสายวิ่ง (เช่น V01)" class="w-full p-4 bg-gray-100 rounded-2xl mb-4 text-center font-bold uppercase outline-none border focus:ring-2 focus:ring-blue-500">
            <button onclick="App.login()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg">เข้าสู่ระบบ 🚀</button>
        </div>
    </div>

    <header id="main-header" class="bg-white p-4 border-b hidden flex justify-between items-center shadow-sm">
        <div class="bg-blue-600 text-white px-3 py-1 rounded-lg font-black text-sm uppercase tracking-wider">สาย: <span id="route-label"></span></div>
        <button onclick="App.logout()" class="text-xs font-bold text-gray-400 uppercase tracking-widest">Logout</button>
    </header>

    <main id="main-content" class="flex-1 hidden">
        <div id="tab-dash" class="app-tab active p-4 space-y-4">
            <h2 class="text-xl font-black">ภาพรวมสายวิ่ง 📊</h2>
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-white p-6 rounded-3xl shadow-sm border text-center">
                    <p class="text-[10px] font-bold text-gray-400 uppercase mb-1">ร้านทั้งหมด</p>
                    <p id="sum-total" class="text-3xl font-black">0</p>
                </div>
                <div class="bg-blue-600 p-6 rounded-3xl shadow-lg text-white text-center">
                    <p class="text-[10px] font-bold opacity-70 uppercase mb-1">วันนี้ (ร้าน)</p>
                    <p id="sum-today" class="text-3xl font-black">0</p>
                </div>
            </div>
        </div>

        <div id="tab-stores" class="app-tab p-4">
            <h2 class="text-xl font-black mb-4">รายชื่อร้านทั้งหมด 🏪</h2>
            <div id="all-stores" class="space-y-3"></div>
        </div>

        <div id="tab-route" class="app-tab flex flex-col p-0">
            <div class="p-3 bg-white border-b shadow-sm">
                <select id="day-select" onchange="App.changeDay(this.value)" class="w-full p-3 bg-gray-50 rounded-xl font-bold text-center appearance-none border"></select>
            </div>
            <div id="map" class="h-[30vh] w-full bg-gray-200 shadow-inner"></div>
            <div id="route-list" class="flex-1 p-4 space-y-3 overflow-y-auto bg-gray-50"></div>
        </div>
    </main>

    <nav id="bottom-nav" class="fixed bottom-0 w-full bg-white border-t flex justify-around p-2 pb-6 hidden shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
        <button onclick="UI.tab('dash')" id="n-dash" class="nav-item active flex flex-col items-center w-1/3"><span class="text-[10px] font-bold uppercase mt-1">Dashboard</span></button>
        <button onclick="UI.tab('stores')" id="n-stores" class="nav-item flex flex-col items-center w-1/3"><span class="text-[10px] font-bold uppercase mt-1">Stores</span></button>
        <button onclick="UI.tab('route')" id="n-route" class="nav-item flex flex-col items-center w-1/3"><span class="text-[10px] font-bold uppercase mt-1">Route</span></button>
    </nav>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDCYxJf0eHryjVJ8_INoWw_uTN14UMaEWE", authDomain: "route-plan-71e2e.firebaseapp.com", projectId: "route-plan-71e2e", storageBucket: "route-plan-71e2e.firebasestorage.app", messagingSenderId: "486778971661", appId: "1:486778971661:web:2ef83fa1eeb09ec6665744" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let State = { myRoute: "", allStores: [], currentDay: "" };
        let map = null, mapMarkers = [], sortableList = null;

        const App = {
            login: () => { 
                let r = document.getElementById('login-input').value.trim().toUpperCase(); 
                if(r) { State.myRoute = r; localStorage.setItem('route_v1', r); App.start(); } 
            },
            logout: () => { localStorage.clear(); window.location.reload(); },
            start: () => {
                let saved = localStorage.getItem('route_v1'); if(!saved) return;
                State.myRoute = saved;
                document.getElementById('login-screen').style.display='none';
                document.getElementById('main-header').classList.remove('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                document.getElementById('bottom-nav').classList.remove('hidden');
                document.getElementById('route-label').innerText = State.myRoute;

                db.collection('appData').doc('v1_main').onSnapshot(doc => {
                    State.allStores = doc.exists && doc.data().routes ? doc.data().routes[State.myRoute] || [] : [];
                    Processor.run();
                });
            }
        };

        const UI = {
            tab: (id) => { 
                document.querySelectorAll('.app-tab').forEach(t=>t.classList.remove('active')); 
                document.getElementById('tab-'+id).classList.add('active'); 
                document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active')); 
                document.getElementById('n-'+id).classList.add('active'); 
                if(id==='route' && map) setTimeout(()=>map.invalidateSize(), 200); 
            }
        };

        const Processor = {
            run: () => {
                document.getElementById('sum-total').innerText = State.allStores.length;
                document.getElementById('all-stores').innerHTML = State.allStores.map(s => `<div class="bg-white p-4 rounded-2xl border shadow-sm font-bold text-sm">${s.name} <p class="text-[10px] text-gray-400 font-normal">ID: ${s.id}</p></div>`).join('');
                
                let ds = new Set(); State.allStores.forEach(s => s.days.forEach(d=>ds.add(d)));
                let sorted = Array.from(ds).sort();
                document.getElementById('day-select').innerHTML = sorted.map(d=>`<option value="${d}">${d}</option>`).join('');
                if(!State.currentDay) State.currentDay = sorted[0];
                Processor.route();
            },
            route: () => {
                let list = State.allStores.filter(s=>s.days.includes(State.currentDay)).sort((a,b)=>(a.seqs?.[State.currentDay]||99)-(b.seqs?.[State.currentDay]||99));
                document.getElementById('sum-today').innerText = list.length;
                document.getElementById('route-list').innerHTML = list.map((s,i) => `<div data-id="${s.id}" class="bg-white p-3 rounded-2xl border shadow-sm flex items-center gap-3"><div class="w-8 h-8 bg-blue-600 text-white rounded-full flex items-center justify-center font-black text-xs">${s.seqs?.[State.currentDay]||i+1}</div><div class="flex-1 font-bold text-sm">${s.name}</div></div>`).join('');
                MapCtrl.draw(list);
            }
        };

        const MapCtrl = {
            init: () => { if(!map) { map = L.map('map', {zoomControl:false}).setView([14, 100], 10); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map); } },
            draw: (list) => {
                MapCtrl.init(); mapMarkers.forEach(m=>map.removeLayer(m)); mapMarkers=[];
                list.forEach(s => { let m = L.circleMarker([s.lat, s.lng], {radius:8, color:'#fff', fillColor:'#2563eb', fillOpacity:1}).addTo(map); mapMarkers.push(m); });
                if(mapMarkers.length) map.fitBounds(new L.featureGroup(mapMarkers).getBounds(), {padding:[20,20]});
            }
        };

        if(localStorage.getItem('route_v1')) App.start();
    </script>
</body>
</html>
