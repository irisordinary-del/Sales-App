<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sales App</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate-src.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="sales-style.css">
</head>
<body>

    <!-- Login screen ถูกย้ายไป login.html แล้ว — ซ่อนไว้ -->
    <div id="login-screen" style="display:none!important"></div>

    <div id="loader">
        <div class="spinner"></div>
        <p class="text-blue-600 font-bold text-lg">กำลังซิงค์ข้อมูลล่าสุด...</p>
    </div>

    <header id="main-header" class="bg-white text-gray-900 px-4 py-3 shrink-0 shadow-sm relative z-50 hidden border-b">
        <div class="flex justify-between items-center">
            <div class="bg-blue-600 text-white text-xs font-black px-2.5 py-1 rounded-lg shadow-sm">สาย: <span id="user-route-label">V00</span></div>
            <div id="sync-status" class="text-[10px] bg-emerald-100 px-2 py-0.5 rounded-full text-emerald-600 font-bold">🟢 อัปเดตล่าสุด</div>
            <button onclick="App.logout()" class="text-[10px] text-gray-400 font-bold">เปลี่ยนสาย</button>
        </div>
    </header>

    <div id="main-content" class="hidden">

        <!-- Tab: ร้านค้า -->
        <div id="tab-stores" class="app-tab bg-gray-50">
            <div class="p-4 shrink-0 bg-white border-b shadow-sm z-10">
                <h2 id="stores-title" class="font-black text-lg text-gray-800 mb-3">รายชื่อร้านค้าทั้งหมด</h2>
                <input type="text" id="search-input" onkeyup="UI.searchStores(this.value)" placeholder="ค้นหารหัสหรือชื่อร้าน..." class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="flex-1 overflow-y-auto p-4 pb-24"><div id="all-store-list" class="space-y-3"></div></div>
        </div>

        <!-- Tab: คิวงาน -->
        <div id="tab-route" class="app-tab bg-gray-50">
            <div class="bg-white p-2 shrink-0 border-b z-20 shadow-sm relative">
                <select id="day-select" class="w-full bg-gray-50 text-gray-900 text-sm font-bold outline-none px-3 py-2 rounded-lg border border-gray-300 text-center appearance-none"></select>
            </div>
            
            <div id="split-container" class="flex-1 flex flex-col lg:flex-row min-h-0 w-full relative">
                
                <div id="map-container" class="relative bg-gray-200 flex items-center justify-center z-10 transition-none">
                    <button id="btn-load-map" onclick="MapCtrl.initAndDraw()" class="bg-blue-600 text-white px-5 py-2 rounded-full text-sm font-bold shadow-lg active:scale-95 transition">📍 เปิดแผนที่นำทาง</button>
                    <div id="map" class="w-full h-full hidden"></div>
                    <button id="btn-fit-map" onclick="MapCtrl.fitBounds()" class="hidden absolute bottom-3 right-3 z-[400] bg-white p-2 rounded-full shadow-lg border text-blue-600 active:scale-95 transition">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" /></svg>
                    </button>
                </div>
                
                <div id="resizer" class="bg-white border-y lg:border-y-0 lg:border-x border-gray-200 flex items-center justify-center z-20 cursor-row-resize lg:cursor-col-resize hover:bg-gray-100 transition-colors shadow-[0_0_10px_rgba(0,0,0,0.05)]" style="flex: 0 0 16px; touch-action: none;">
                    <div class="w-12 h-1.5 bg-gray-300 rounded-full lg:w-1.5 lg:h-12"></div>
                </div>
                
                <div id="route-side-panel" class="flex-1 flex flex-col overflow-hidden bg-gray-50 relative z-10">
                    <div class="flex justify-between items-center p-3 shrink-0 bg-white border-b shadow-sm">
                        <h3 class="font-bold text-sm text-gray-800" id="route-title">สายวิ่ง</h3>
                        <div id="edit-order-btn-wrap" style="display:flex;gap:6px;">
                        <button id="edit-order-btn" onclick="UI.startEditOrder()"
                            style="font-size:11px;font-weight:700;padding:4px 10px;border-radius:7px;border:1px solid #d1d5db;background:white;color:#374151;cursor:pointer;">
                            ✏️ แก้ไขลำดับ
                        </button>
                        <button id="confirm-order-btn" onclick="UI.confirmEditOrder()"
                            style="font-size:11px;font-weight:700;padding:4px 10px;border-radius:7px;border:none;background:#22c55e;color:white;cursor:pointer;display:none;">
                            ✓ ยืนยัน
                        </button>
                    </div>
                    </div>
                    <div id="route-store-list" class="flex-1 overflow-y-auto px-3 py-3 pb-24 space-y-2"></div>
                </div>

            </div>
        </div>

    </div>

    <!-- Hamburger floating button -->
    <button id="hamburger-btn"
        style="position:fixed;bottom:20px;right:16px;z-index:1001;width:52px;height:52px;border-radius:50%;background:#1f2937;color:white;border:none;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,0.35);"
        onclick="UI.toggleMenu()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
    </button>

    <!-- Menu overlay -->
    <div id="menu-overlay" onclick="UI.closeMenu()"
        style="position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.45);display:none;align-items:flex-end;justify-content:flex-end;">
        <div onclick="event.stopPropagation()"
            style="position:absolute;bottom:84px;right:16px;background:white;border-radius:18px;box-shadow:0 8px 40px rgba(0,0,0,0.22);overflow:hidden;min-width:180px;">
            <button onclick="UI.switchTab('route'); UI.closeMenu()"
                style="display:block;width:100%;padding:15px 20px;text-align:left;border:none;background:none;cursor:pointer;font-size:15px;font-weight:700;color:#111827;border-bottom:1px solid #f3f4f6;transition:background 0.1s;"
                onmouseenter="this.style.background='#f9fafb'" onmouseleave="this.style.background='none'">
                📋 คิวงาน
            </button>
            <button onclick="UI.switchTab('stores'); UI.closeMenu()"
                style="display:block;width:100%;padding:15px 20px;text-align:left;border:none;background:none;cursor:pointer;font-size:15px;font-weight:700;color:#111827;transition:background 0.1s;"
                onmouseenter="this.style.background='#f9fafb'" onmouseleave="this.style.background='none'">
                🏪 ร้านค้า
            </button>
        </div>
    </div>

    <!-- Store Modal -->
    <div id="store-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[99999] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden transform transition-all">
            <div class="bg-gray-50 p-4 border-b flex justify-between items-start">
                <div><h2 id="m-name" class="text-lg font-black text-gray-800 leading-tight">...</h2><p id="m-id" class="text-xs text-blue-600 font-mono mt-0.5 uppercase">ID: ...</p></div>
                <button onclick="UI.closeModal()" class="bg-white border w-8 h-8 rounded-full text-gray-400 font-bold shadow-sm">✕</button>
            </div>
            <div class="p-4 space-y-4">
                <div class="grid grid-cols-2 gap-2 text-center">
                    <div class="bg-blue-50 p-2 rounded-xl border border-blue-100"><p class="text-[9px] text-blue-500 font-bold mb-1 uppercase">ยอดซื้อ (EA)</p><p id="m-sales" class="text-lg font-black text-blue-700">0</p></div>
                    <div class="bg-indigo-50 p-2 rounded-xl border border-indigo-100"><p class="text-[9px] text-indigo-500 font-bold mb-1 uppercase">จำนวนบิล</p><p id="m-bills" class="text-lg font-black text-indigo-700">0</p></div>
                    <div class="bg-teal-50 p-2 rounded-xl border border-teal-100"><p class="text-[9px] text-teal-500 font-bold mb-1 uppercase">VPO รายร้าน</p><p id="m-vpo" class="text-lg font-black text-teal-700">0</p></div>
                    <div class="bg-purple-50 p-2 rounded-xl border border-purple-100"><p class="text-[9px] text-purple-500 font-bold mb-1 uppercase">SKU ที่ซื้อ</p><p id="m-sku" class="text-lg font-black text-purple-700">0</p></div>
                </div>
                <div class="space-y-2">
                    <div id="m-j-box" class="flex justify-between items-center p-2 rounded-lg border text-xs font-bold"><span>เจลลี่</span><span id="m-j-status">...</span></div>
                    <div id="m-k-box" class="flex justify-between items-center p-2 rounded-lg border text-xs font-bold"><span>กลมกล่อม</span><span id="m-k-status">...</span></div>
                </div>
            </div>
            <div class="p-3 bg-gray-50 border-t"><button id="m-nav-btn" class="w-full bg-blue-600 text-white py-3 rounded-xl font-black shadow-md active:scale-95 transition">🚗 นำทางไปร้านนี้</button></div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="sales-app.js"></script>
</body>
</html>
