<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="/icons/icon-192.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Planner — เลือกศูนย์</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:       #0a0f1a;
            --surface:  #111827;
            --surface2: #1a2235;
            --border:   #1e2d45;
            --border2:  #2a3f5f;
            --accent:   #38bdf8;
            --green:    #22c55e;
            --red:      #ef4444;
            --text:     #e2e8f0;
            --muted:    #64748b;
            --muted2:   #94a3b8;
        }

        body {
            font-family: 'IBM Plex Sans Thai', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(56,189,248,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56,189,248,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .wrap {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 780px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 48px;
            animation: fadeDown 0.5s ease both;
        }
        .header-icon { font-size: 2.4rem; margin-bottom: 10px; display: block; }
        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.02em;
        }
        .header h1 span { color: var(--accent); }
        .header p { margin-top: 8px; color: var(--muted2); font-size: 0.85rem; }

        /* Grid */
        #center-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(168px, 1fr));
            gap: 16px;
        }

        /* Card */
        .center-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 28px 16px 22px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s, transform 0.18s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
            animation: fadeUp 0.4s ease both;
        }
        .center-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), var(--green));
            opacity: 0;
            transition: opacity 0.2s;
        }
        .center-card:hover {
            border-color: var(--accent);
            background: var(--surface2);
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(56,189,248,0.12);
        }
        .center-card:hover::after { opacity: 1; }

        .center-badge {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 2.2rem;
            font-weight: 600;
            color: var(--accent);
            line-height: 1;
            margin-bottom: 8px;
        }
        .center-name  { font-size: 0.78rem; color: var(--muted2); margin-bottom: 6px; font-weight: 500; }
        .center-routes { font-size: 0.72rem; color: var(--muted); font-family: 'IBM Plex Mono', monospace; transition: color 0.3s; }
        .center-routes.loaded { color: var(--green); }

        /* Delete button — ซ่อนไว้ก่อน hover */
        .delete-btn {
            position: absolute;
            top: 8px; right: 8px;
            width: 26px; height: 26px;
            border-radius: 8px;
            border: 1px solid transparent;
            background: transparent;
            color: var(--muted);
            font-size: 13px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            opacity: 0;
            transition: opacity 0.15s, background 0.15s, border-color 0.15s, color 0.15s;
            z-index: 10;
            line-height: 1;
        }
        .center-card:hover .delete-btn { opacity: 1; }
        .delete-btn:hover {
            background: rgba(239,68,68,0.15);
            border-color: rgba(239,68,68,0.5);
            color: var(--red);
        }

        /* Add card */
        .add-card {
            border: 2px dashed var(--border2);
            background: transparent;
        }
        .add-card:hover {
            border-color: var(--green);
            background: rgba(34,197,94,0.05);
            box-shadow: 0 12px 32px rgba(34,197,94,0.08);
        }
        .add-card:hover::after { opacity: 0; }
        .add-icon { font-size: 2rem; color: var(--green); line-height: 1; margin-bottom: 8px; }

        /* Skeleton */
        .skeleton {
            background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 18px;
            height: 128px;
            border: 1px solid var(--border);
        }
        @keyframes shimmer { to { background-position: -200% 0; } }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(4px);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 20px;
            padding: 28px 24px 22px;
            width: 100%; max-width: 360px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.5);
            animation: popIn 0.2s ease;
        }
        .modal-title { font-size: 1rem; font-weight: 700; color: #fff; margin-bottom: 6px; }
        .modal-sub   { font-size: 0.8rem; color: var(--muted2); margin-bottom: 20px; line-height: 1.6; }

        .modal input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border2);
            border-radius: 10px;
            padding: 10px 14px;
            color: #fff;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            outline: none;
            margin-bottom: 10px;
            transition: border-color 0.2s;
        }
        .modal input:focus { border-color: var(--accent); }
        .modal input::placeholder { color: var(--muted); font-weight: 400; }

        .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
        .btn {
            padding: 8px 18px;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.82rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: opacity 0.15s, transform 0.1s;
        }
        .btn:active { transform: scale(0.97); }
        .btn-cancel  { background: var(--surface2); border: 1px solid var(--border2); color: var(--muted2); }
        .btn-confirm { background: var(--accent); color: #0a0f1a; }
        .btn-danger  { background: var(--red); color: #fff; }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 28px; left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #111827;
            border: 1px solid var(--border2);
            color: #fff;
            padding: 10px 22px;
            border-radius: 100px;
            font-size: 0.82rem;
            font-weight: 600;
            z-index: 99999;
            transition: transform 0.3s, opacity 0.3s;
            opacity: 0;
            white-space: nowrap;
            pointer-events: none;
        }
        #toast.show  { transform: translateX(-50%) translateY(0); opacity: 1; }
        #toast.error { background: var(--red); border-color: transparent; }

        /* Error */
        .error-state { grid-column: 1/-1; text-align: center; padding: 40px 20px; color: var(--muted2); }
        .error-state p { margin-bottom: 16px; line-height: 1.6; }
        .retry-btn {
            padding: 8px 20px;
            background: var(--accent); color: #0a0f1a;
            border: none; border-radius: 10px;
            font-weight: 700; cursor: pointer; font-family: inherit;
        }

        /* Animations */
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.94); }
            to   { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="wrap">
    <div class="header">
        <span class="header-icon">🗺️</span>
        <h1>Route <span>Planner</span></h1>
        <p>เลือกศูนย์ที่ต้องการจัดการ</p>
        <!-- User info bar -->
        <div style="margin-top:14px;display:flex;align-items:center;justify-content:center;gap:12px;font-size:0.78rem;">
            <span style="color:#64748b;">⚙️ Admin:</span>
            <span style="color:#e2e8f0;font-weight:600;" id="cs-username"></span>
            <a href="users.html" style="color:#38bdf8;font-weight:700;text-decoration:none;">👥 Users</a>
            <button onclick="Auth.logout()" style="background:none;border:none;color:#64748b;cursor:pointer;font-size:0.78rem;font-family:inherit;font-weight:600;padding:0;transition:color 0.2s;" onmouseover="this.style.color='#ef4444'" onmouseout="this.style.color='#64748b'">ออกจากระบบ</button>
        </div>
    </div>
    <div id="center-grid">
        <div class="skeleton"></div>
        <div class="skeleton" style="animation-delay:.1s"></div>
        <div class="skeleton" style="animation-delay:.2s"></div>
        <div class="skeleton" style="animation-delay:.3s"></div>
    </div>
</div>

<!-- Modal: เพิ่มศูนย์ -->
<div class="modal-overlay" id="modal-add">
    <div class="modal">
        <div class="modal-title">➕ เพิ่มศูนย์ใหม่</div>
        <div class="modal-sub">กรอกรหัสและชื่อศูนย์ที่ต้องการสร้าง</div>
        <input id="add-id"   type="text" placeholder="รหัสศูนย์ (เช่น 407)" maxlength="10">
        <input id="add-name" type="text" placeholder="ชื่อศูนย์ (เช่น ศูนย์ 407)">
        <div class="modal-btns">
            <button class="btn btn-cancel" onclick="Modal.closeAdd()">ยกเลิก</button>
            <button class="btn btn-confirm" onclick="App.confirmAdd()">✅ สร้างศูนย์</button>
        </div>
    </div>
</div>

<!-- Modal: ยืนยันลบ -->
<div class="modal-overlay" id="modal-delete">
    <div class="modal">
        <div class="modal-title">🗑️ ลบศูนย์</div>
        <div class="modal-sub" id="delete-msg"></div>
        <div class="modal-btns">
            <button class="btn btn-cancel" onclick="Modal.closeDelete()">ยกเลิก</button>
            <button class="btn btn-danger"  onclick="App.confirmDelete()">ลบออก</button>
        </div>
    </div>
</div>

<div id="toast"></div>

<script src="app-config-init.js"></script>
<script src="auth.js"></script>
<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#6366f1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RoutePlan">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<script>
// ── Guard: admin only ──────────────────────────────────
const _session = Auth.guard(['admin']);
if (!_session) throw new Error('Unauthorized');

// ── Toast ──────────────────────────────────────────────
const Toast = {
    _t: null,
    show(msg, isError = false) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className = 'show' + (isError ? ' error' : '');
        clearTimeout(Toast._t);
        Toast._t = setTimeout(() => { el.className = ''; }, 2800);
    }
};

// ── Modal ──────────────────────────────────────────────
const Modal = {
    openAdd() {
        document.getElementById('add-id').value = '';
        document.getElementById('add-name').value = '';
        document.getElementById('modal-add').classList.add('open');
        setTimeout(() => document.getElementById('add-id').focus(), 120);
    },
    closeAdd()    { document.getElementById('modal-add').classList.remove('open'); },
    openDelete(id, name) {
        App._pendingDelete = id;
        document.getElementById('delete-msg').innerHTML =
            `คุณต้องการลบ <b style="color:#38bdf8">${name || 'ศูนย์ ' + id}</b> ออกจากรายการ?<br>
             <span style="color:#ef4444;font-size:0.73rem">⚠️ ข้อมูลสายวิ่งใน Firestore จะยังคงอยู่</span>`;
        document.getElementById('modal-delete').classList.add('open');
    },
    closeDelete() {
        document.getElementById('modal-delete').classList.remove('open');
        App._pendingDelete = null;
    }
};

// ── App ────────────────────────────────────────────────
const db = firebase.firestore();
const CENTERS_DOC = db.collection('appData').doc('app_centers');

const App = {
    centers: {},
    _pendingDelete: null,

    init() {
        // แสดงชื่อ admin
        const el = document.getElementById('cs-username');
        if (el) el.textContent = _session.displayName || _session.username;

        CENTERS_DOC.onSnapshot(doc => {
            App.centers = doc.exists ? (doc.data().centers || {}) : {};
            App.render();
        }, err => {
            console.error(err);
            document.getElementById('center-grid').innerHTML = `
                <div class="error-state">
                    <p>⚠️ โหลดข้อมูลไม่สำเร็จ<br>กรุณาตรวจสอบอินเทอร์เน็ต</p>
                    <button class="retry-btn" onclick="location.reload()">🔄 ลองอีกครั้ง</button>
                </div>`;
        });
    },

    render() {
        const ids = Object.keys(App.centers).sort();
        const cards = ids.map((id, i) => {
            const c = App.centers[id];
            const safeName = (c.name || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
            return `
            <div class="center-card" onclick="App.select('${id}')" style="animation-delay:${i*0.06}s">
                <button class="delete-btn"
                    title="ลบศูนย์"
                    onclick="event.stopPropagation(); Modal.openDelete('${id}','${safeName}')">✕</button>
                <div class="center-badge">${id}</div>
                <div class="center-name">${c.name || 'ศูนย์ ' + id}</div>
                <div class="center-routes" id="rc-${id}">
                    ${c.routeCount != null ? c.routeCount + ' สายวิ่ง' : '…'}
                </div>
            </div>`;
        });

        cards.push(`
            <div class="center-card add-card" onclick="Modal.openAdd()" style="animation-delay:${ids.length*0.06}s">
                <div class="add-icon">+</div>
                <div class="center-name">เพิ่มศูนย์</div>
            </div>`);

        document.getElementById('center-grid').innerHTML = cards.join('');
        ids.forEach(id => App.loadCount(id));
    },

    async loadCount(id) {
        try {
            const docId = App.centers[id].docId || (id + '_main');
            const snap  = await db.collection('appData').doc(docId).get();
            const count = snap.exists ? (snap.data().routeList || []).length : 0;
            const el = document.getElementById('rc-' + id);
            if (el) { el.textContent = count + ' สายวิ่ง'; el.classList.add('loaded'); }
            App.centers[id].routeCount = count;
        } catch (_) {}
    },

    select(id) { window.location.href = 'index.html?center=' + id; },

    // ── เพิ่มศูนย์ ─────────────────────────────────────
    confirmAdd() {
        const idVal   = document.getElementById('add-id').value.trim();
        const nameVal = document.getElementById('add-name').value.trim();
        if (!idVal) return Toast.show('กรุณากรอกรหัสศูนย์', true);
        if (App.centers[idVal]) return Toast.show('มีรหัสศูนย์นี้แล้วครับ', true);

        const docId = idVal + '_main';
        const name  = nameVal || 'ศูนย์ ' + idVal;
        Modal.closeAdd();
        Toast.show('⏳ กำลังสร้างศูนย์ ' + idVal + '...');

        Promise.all([
            db.collection('appData').doc(docId).set({
                routeList: [], cycleDays: 24,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            }),
            CENTERS_DOC.set({
                centers: { ...App.centers, [idVal]: { name, docId, routeCount: 0 } }
            }, { merge: true })
        ])
        .then(() => { Toast.show('✅ สร้างศูนย์ ' + idVal + ' เรียบร้อย'); setTimeout(() => App.select(idVal), 900); })
        .catch(err => Toast.show('❌ สร้างไม่สำเร็จ: ' + err.message, true));
    },

    // ── ลบศูนย์ ────────────────────────────────────────
    confirmDelete() {
        const id = App._pendingDelete;
        if (!id) return;
        Modal.closeDelete();

        // ลบออกจาก centers map แล้ว set ทับ (ไม่ใช้ merge เพื่อให้ลบ key จริงๆ)
        const updated = { ...App.centers };
        delete updated[id];

        Toast.show('⏳ กำลังลบศูนย์ ' + id + '...');
        CENTERS_DOC.update({ ['centers.' + id]: firebase.firestore.FieldValue.delete() })
            .then(() => Toast.show('🗑️ ลบศูนย์ ' + id + ' เรียบร้อย'))
            .catch(err => Toast.show('❌ ลบไม่สำเร็จ: ' + err.message, true));
    }
};

// keyboard shortcuts
document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('modal-add').classList.contains('open')) App.confirmAdd();
    if (e.key === 'Escape') { Modal.closeAdd(); Modal.closeDelete(); }
});
// click outside to close
['modal-add','modal-delete'].forEach(id => {
    document.getElementById(id).addEventListener('click', e => {
        if (e.target.id === id) { Modal.closeAdd(); Modal.closeDelete(); }
    });
});

window.addEventListener('DOMContentLoaded', App.init);
</script>
<script src="pwa-register.js"></script>
</body>
</html>
